apiVersion: apps/v1
kind: Deployment
metadata:
  name: glasslab-agent-api
  namespace: glasslab-agents
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: glasslab-agent-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: glasslab-agent-api
    spec:
      serviceAccountName: glasslab-agent-api
      nodeSelector:
        kubernetes.io/hostname: node03
      containers:
        - name: api
          image: ghcr.io/offensivegeneric/glasslab-agent-api:0.1.0
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: glasslab-agent-api-config
            - secretRef:
                name: glasslab-agent-secrets
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "1"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 20
          volumeMounts:
            - name: state-volume
              mountPath: /var/lib/glasslab-agent/state
            - name: artifacts-volume
              mountPath: /mnt/artifacts
      volumes:
        - name: state-volume
          persistentVolumeClaim:
            claimName: glasslab-agent-state
        - name: artifacts-volume
          persistentVolumeClaim:
            claimName: glasslab-agent-artifacts
---
apiVersion: v1
kind: Service
metadata:
  name: glasslab-agent-api
  namespace: glasslab-agents
spec:
  selector:
    app.kubernetes.io/name: glasslab-agent-api
  ports:
    - name: http
      port: 8080
      targetPort: 8080
