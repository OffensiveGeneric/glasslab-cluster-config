apiVersion: apps/v1
kind: Deployment
metadata:
  name: vllm
  namespace: glasslab-agents
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vllm
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vllm
    spec:
      enableServiceLinks: false
      runtimeClassName: nvidia
      nodeSelector:
        glasslab.io/gpu-candidate: "true"
        kubernetes.io/hostname: node02
      containers:
        - name: vllm
          image: vllm/vllm-openai:v0.8.5
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              python3 -m vllm.entrypoints.openai.api_server \
                --host 0.0.0.0 \
                --port 8000 \
                --model "$MODEL_NAME" \
                --max-model-len "$MAX_MODEL_LEN" \
                --api-key "$VLLM_API_KEY"
          envFrom:
            - configMapRef:
                name: vllm-config
            - secretRef:
                name: glasslab-agent-secrets
          ports:
            - containerPort: 8000
              name: http
          resources:
            requests:
              cpu: "4"
              memory: 16Gi
              nvidia.com/gpu: "1"
            limits:
              cpu: "6"
              memory: 24Gi
              nvidia.com/gpu: "1"
          startupProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 90
          readinessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8000
            initialDelaySeconds: 60
            periodSeconds: 20
          volumeMounts:
            - name: model-cache
              mountPath: /root/.cache/huggingface
      volumes:
        - name: model-cache
          persistentVolumeClaim:
            claimName: vllm-model-cache
