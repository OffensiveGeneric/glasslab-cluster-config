apiVersion: v1
kind: PersistentVolume
metadata:
  name: mlflow-data-pv
spec:
  capacity:
    storage: 10Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  claimRef:
    namespace: glasslab-agents
    name: mlflow-data
  local:
    path: /var/lib/glasslab-agent/mlflow
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - node03
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mlflow-data
  namespace: glasslab-agents
spec:
  storageClassName: ""
  volumeName: mlflow-data-pv
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mlflow
  namespace: glasslab-agents
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: mlflow
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mlflow
    spec:
      nodeSelector:
        kubernetes.io/hostname: node03
      containers:
        - name: mlflow
          image: ghcr.io/mlflow/mlflow:v2.20.1
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              mlflow server \
                --backend-store-uri sqlite:////mlflow/mlflow.db \
                --artifacts-destination /mlflow/artifacts \
                --host 0.0.0.0 \
                --port 5000
          ports:
            - containerPort: 5000
              name: http
          volumeMounts:
            - name: mlflow-data
              mountPath: /mlflow
      volumes:
        - name: mlflow-data
          persistentVolumeClaim:
            claimName: mlflow-data
---
apiVersion: v1
kind: Service
metadata:
  name: mlflow
  namespace: glasslab-agents
spec:
  selector:
    app.kubernetes.io/name: mlflow
  ports:
    - name: http
      port: 5000
      targetPort: 5000
