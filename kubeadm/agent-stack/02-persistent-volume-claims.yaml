apiVersion: v1
kind: PersistentVolume
metadata:
  name: glasslab-agent-state-pv
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  claimRef:
    namespace: glasslab-agents
    name: glasslab-agent-state
  local:
    path: /var/lib/glasslab-agent/state
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - node03
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: glasslab-agent-state
  namespace: glasslab-agents
spec:
  storageClassName: ""
  volumeName: glasslab-agent-state-pv
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 5Gi
---
