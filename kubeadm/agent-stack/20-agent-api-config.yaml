apiVersion: v1
kind: ConfigMap
metadata:
  name: glasslab-agent-api-config
  namespace: glasslab-agents
data:
  GLASSLAB_AGENT_LOG_LEVEL: INFO
  GLASSLAB_AGENT_PLANNER_MODEL_NAME: Qwen/Qwen3-4B-Instruct-2507
  GLASSLAB_AGENT_QWEN_API_BASE: http://vllm.glasslab-agents.svc.cluster.local:8000/v1
  GLASSLAB_AGENT_RUNNER_NAMESPACE: glasslab-agents
  GLASSLAB_AGENT_RUNNER_SERVICE_ACCOUNT_NAME: glasslab-agent-api
  GLASSLAB_AGENT_RUNNER_IMAGE: ghcr.io/offensivegeneric/glasslab-titanic-runner:0.1.0
  GLASSLAB_AGENT_RUNNER_IMAGE_PULL_POLICY: IfNotPresent
  GLASSLAB_AGENT_RUNNER_BACKOFF_LIMIT: "0"
  GLASSLAB_AGENT_RUNNER_JOB_TTL_SECONDS: "86400"
  GLASSLAB_AGENT_GPU_RUNTIME_CLASS_NAME: nvidia
  GLASSLAB_AGENT_DATASET_PVC_NAME: titanic-datasets
  GLASSLAB_AGENT_DATASET_MOUNT_PATH: /mnt/datasets
  GLASSLAB_AGENT_DATASET_SUBPATH_TITANIC: titanic
  GLASSLAB_AGENT_ARTIFACTS_PVC_NAME: glasslab-agent-artifacts
  GLASSLAB_AGENT_ARTIFACTS_MOUNT_PATH: /mnt/artifacts
  GLASSLAB_AGENT_STATE_PVC_NAME: glasslab-agent-state
  GLASSLAB_AGENT_STATE_MOUNT_PATH: /var/lib/glasslab-agent/state
  GLASSLAB_AGENT_STATE_DB_PATH: /var/lib/glasslab-agent/state/agent.db
  GLASSLAB_AGENT_MLFLOW_ENABLED: "false"
  GLASSLAB_AGENT_MLFLOW_TRACKING_URI: http://mlflow.glasslab-agents.svc.cluster.local:5000
  GLASSLAB_AGENT_MLFLOW_EXPERIMENT_NAME: glasslab-titanic
  GLASSLAB_AGENT_POLL_INTERVAL_SECONDS: "10"
---
apiVersion: v1
kind: Service
metadata:
  name: glasslab-agent-api
  namespace: glasslab-agents
spec:
  selector:
    app.kubernetes.io/name: glasslab-agent-api
  ports:
    - name: http
      port: 8080
      targetPort: 8080
