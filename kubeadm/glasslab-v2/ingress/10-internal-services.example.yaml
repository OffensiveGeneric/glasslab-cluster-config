# Example only.
# This file documents the intended future internal-only ingress direction.
# It is not part of the default deploy path.
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: glasslab-v2-internal-example
  namespace: glasslab-v2
spec:
  ingressClassName: internal-nginx
  rules:
    - host: whatsapp-gateway.glasslab.internal
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: glasslab-whatsapp-gateway
                port:
                  number: 8097
    - host: minio-console.glasslab.internal
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: glasslab-minio
                port:
                  number: 9001
