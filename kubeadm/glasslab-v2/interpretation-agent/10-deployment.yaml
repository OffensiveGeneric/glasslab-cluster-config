apiVersion: apps/v1
kind: Deployment
metadata:
  name: glasslab-interpretation-agent
  namespace: glasslab-v2
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: glasslab-interpretation-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: glasslab-interpretation-agent
    spec:
      imagePullSecrets:
        - name: glasslab-ghcr-pull
      containers:
        - name: interpretation-agent
          image: ghcr.io/offensivegeneric/glasslab-interpretation-agent:0.1.1
          imagePullPolicy: IfNotPresent
          env:
            - name: GLASSLAB_INTERPRETATION_AGENT_PROVIDER_API
              value: ollama
            - name: GLASSLAB_INTERPRETATION_AGENT_PROVIDER_BASE_URL
              value: http://192.168.1.23:11434
            - name: GLASSLAB_INTERPRETATION_AGENT_MODEL
              value: qwen3:30b
            - name: GLASSLAB_INTERPRETATION_AGENT_TIMEOUT_SECONDS
              value: "45"
            - name: GLASSLAB_INTERPRETATION_AGENT_FALLBACK_PROVIDER_API
              value: ollama
            - name: GLASSLAB_INTERPRETATION_AGENT_FALLBACK_PROVIDER_BASE_URL
              value: http://192.168.1.12:11434
            - name: GLASSLAB_INTERPRETATION_AGENT_FALLBACK_MODEL
              value: qwen3:14b
            - name: GLASSLAB_INTERPRETATION_AGENT_FALLBACK_TIMEOUT_SECONDS
              value: "30"
          ports:
            - containerPort: 8091
              name: http
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
