apiVersion: apps/v1
kind: Deployment
metadata:
  name: glasslab-schedule-worker
  namespace: glasslab-v2
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: glasslab-schedule-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: glasslab-schedule-worker
    spec:
      imagePullSecrets:
        - name: glasslab-ghcr-pull
      containers:
        - name: schedule-worker
          image: ghcr.io/offensivegeneric/glasslab-schedule-worker:0.1.0
          imagePullPolicy: IfNotPresent
          env:
            - name: GLASSLAB_SCHEDULE_WORKER_WORKFLOW_API_URL
              value: http://glasslab-workflow-api.glasslab-v2.svc.cluster.local:8080
            - name: GLASSLAB_SCHEDULE_WORKER_TIMEOUT_SECONDS
              value: "30"
          ports:
            - containerPort: 8094
              name: http
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
