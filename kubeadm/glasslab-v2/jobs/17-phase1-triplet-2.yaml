apiVersion: batch/v1
kind: Job
metadata:
  name: phase1-triplet-2
  namespace: glasslab-v2
spec:
  template:
    spec:
      containers:
        - name: metric-search
          image: ghcr.io/offensivegeneric/glasslab-metric-search:phase1-triplet-81a0266
          env:
            - name: GLASSLAB_RUNNER_EXPERIMENT_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: GLASSLAB_IMAGE_COMMIT
              value: "phase1-triplet-81a0266"
          command: ["bash", "-c"]
          args:
            - |
              cd /app
              python3 scripts/run_experiment.py \
                --config configs/search_spaces/cifar100_contrastive_v0.yaml \
                --output-dir /mnt/artifacts/phase1-triplet-2-${GLASSLAB_RUNNER_EXPERIMENT_ID} \
                --epochs 3 \
                --max-train-batches 10 \
                --max-eval-batches 16 \
                --backbone resnet18 \
                --loss triplet
              echo "Output dir: /mnt/artifacts/phase1-triplet-2-${GLASSLAB_RUNNER_EXPERIMENT_ID}"
              ls -lh "/mnt/artifacts/phase1-triplet-2-${GLASSLAB_RUNNER_EXPERIMENT_ID}" || true
              test -f "/mnt/artifacts/phase1-triplet-2-${GLASSLAB_RUNNER_EXPERIMENT_ID}/metrics.json" && echo "metrics.json found" || echo "ERROR: metrics.json not found"
          resources:
            limits:
              nvidia.com/gpu: 1
              memory: "16Gi"
              cpu: "2"
            requests:
              memory: "8Gi"
              cpu: "1"
          volumeMounts:
            - name: artifacts
              mountPath: /mnt/artifacts
            - name: datasets
              mountPath: /mnt/datasets
      restartPolicy: Never
      nodeSelector:
        glasslab.io/gpu-vendor: nvidia
      imagePullSecrets:
        - name: glasslab-ghcr-pull
      volumes:
        - name: artifacts
          persistentVolumeClaim:
            claimName: glasslab-shared-artifacts
        - name: datasets
          persistentVolumeClaim:
            claimName: glasslab-shared-datasets
  backoffLimit: 1
  ttlSecondsAfterFinished: 86400
