apiVersion: batch/v1
kind: Job
metadata:
  name: baseline-random
  namespace: glasslab-v2
  labels:
    app: glasslab-metric-search
    baseline-type: random
spec:
  template:
    spec:
      containers:
        - name: baseline
          image: ghcr.io/offensivegeneric/glasslab-metric-search:a809cf27ef849a71348c03ec01d0457bfbebd49f
          env:
            - name: GLASSLAB_RUNNER_EXPERIMENT_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: GLASSLAB_IMAGE_COMMIT
              value: "a809cf27ef849a71348c03ec01d0457bfbebd49f"
          command: ["bash", "-c"]
          args:
            - |
              cd /app
              python3 /app/scripts/run_baseline.py \
                --baseline=random \
                --output-dir=/mnt/artifacts/baselines/random/${GLASSLAB_RUNNER_EXPERIMENT_ID} \
                --max-eval-batches=20 \
                --run-shuffled
              echo "Output dir: /mnt/artifacts/baselines/random/${GLASSLAB_RUNNER_EXPERIMENT_ID}"
              ls -lh "/mnt/artifacts/baselines/random/${GLASSLAB_RUNNER_EXPERIMENT_ID}" || true
              test -f "/mnt/artifacts/baselines/random/${GLASSLAB_RUNNER_EXPERIMENT_ID}/metrics.json" && echo "metrics.json found" || echo "ERROR: metrics.json not found"
          resources:
            limits:
              nvidia.com/gpu: 1
              memory: "32Gi"
              cpu: "4"
            requests:
              memory: "16Gi"
              cpu: "2"
          volumeMounts:
            - name: artifacts
              mountPath: /mnt/artifacts
            - name: datasets
              mountPath: /mnt/datasets
      restartPolicy: Never
      imagePullSecrets:
        - name: ghcr-secret
      nodeSelector:
        glasslab.io/gpu-vendor: nvidia
      volumes:
        - name: artifacts
          persistentVolumeClaim:
            claimName: glasslab-shared-artifacts
        - name: datasets
          persistentVolumeClaim:
            claimName: glasslab-shared-datasets
  backoffLimit: 3
  ttlSecondsAfterFinished: 86400
