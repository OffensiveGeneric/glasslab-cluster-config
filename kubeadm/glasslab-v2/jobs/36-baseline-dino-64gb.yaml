apiVersion: batch/v1
kind: Job
metadata:
  name: baseline-dino-64gb
  namespace: glasslab-v2
  labels:
    app: glasslab-metric-search
    baseline-type: dino
    target-node: 64gb
spec:
  template:
    spec:
      containers:
        - name: baseline
          image: ghcr.io/offensivegeneric/glasslab-metric-search:fdbff3f
          env:
            - name: GLASSLAB_RUNNER_EXPERIMENT_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: GLASSLAB_IMAGE_COMMIT
              value: "fdbff3f"
          command: ["bash", "-c"]
          args:
            - |
              cd /app
              python3 /app/scripts/run_baseline.py \
                --baseline=dino \
                --output-dir=/mnt/artifacts/baselines/dino-64gb/${GLASSLAB_RUNNER_EXPERIMENT_ID} \
                --max-eval-batches=20 \
                --run-shuffled
              echo "Output dir: /mnt/artifacts/baselines/dino-64gb/${GLASSLAB_RUNNER_EXPERIMENT_ID}"
              ls -lh "/mnt/artifacts/baselines/dino-64gb/${GLASSLAB_RUNNER_EXPERIMENT_ID}" || true
              test -f "/mnt/artifacts/baselines/dino-64gb/${GLASSLAB_RUNNER_EXPERIMENT_ID}/metrics.json" && echo "metrics.json found" || echo "ERROR: metrics.json not found"
          resources:
            limits:
              nvidia.com/gpu: 1
              memory: "56Gi"
              cpu: "4"
            requests:
              memory: "48Gi"
              cpu: "2"
          volumeMounts:
            - name: artifacts
              mountPath: /mnt/artifacts
            - name: datasets
              mountPath: /mnt/datasets
      restartPolicy: Never
      imagePullSecrets:
        - name: ghcr-secret
      nodeSelector:
        glasslab.io/gpu-vendor: nvidia
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: glasslab.io/gpu-vendor
                    operator: In
                    values:
                      - nvidia
                  - key: kubernetes.io/hostname
                    operator: NotIn
                    values:
                      - node04
      volumes:
        - name: artifacts
          persistentVolumeClaim:
            claimName: glasslab-shared-artifacts
        - name: datasets
          persistentVolumeClaim:
            claimName: glasslab-shared-datasets
  backoffLimit: 3
  ttlSecondsAfterFinished: 86400
