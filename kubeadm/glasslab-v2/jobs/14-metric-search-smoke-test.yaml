apiVersion: batch/v1
kind: Job
metadata:
  name: metric-search-smoke-test
  namespace: glasslab-v2
spec:
  template:
    spec:
      containers:
        - name: metric-search
          image: ghcr.io/offensivegeneric/glasslab-metric-search:faa46eb
          command: ["python", "scripts/run_experiment.py", "--config", "configs/search_spaces/cifar100_contrastive_v0.yaml", "--output-dir", "/mnt/artifacts/smoke-test-run", "--epochs", "1", "--max-train-batches", "1", "--max-eval-batches", "1", "--backbone", "resnet18", "--loss", "contrastive"]
          resources:
            limits:
              nvidia.com/gpu: 1
              memory: "4Gi"
              cpu: "2"
            requests:
              memory: "2Gi"
              cpu: "1"
          volumeMounts:
            - name: artifacts
              mountPath: /mnt/artifacts
            - name: datasets
              mountPath: /mnt/datasets
      restartPolicy: Never
      nodeSelector:
        glasslab.io/gpu-vendor: nvidia
      volumes:
        - name: artifacts
          persistentVolumeClaim:
            claimName: glasslab-shared-artifacts
        - name: datasets
          persistentVolumeClaim:
            claimName: glasslab-shared-datasets
  backoffLimit: 1
  ttlSecondsAfterFinished: 86400
