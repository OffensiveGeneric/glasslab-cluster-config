apiVersion: batch/v1
kind: Job
metadata:
  name: titanic-ml-train
  namespace: glasslab-v2
  labels:
    app: glasslab-titanic
spec:
  template:
    spec:
      containers:
        - name: titanic-trainer
          image: ghcr.io/offensivegeneric/glasslab-gpu-experiment-runner:0.1.7-local
          command: ["python", "/app/titanic_train.py"]
          resources:
            limits:
              nvidia.com/gpu: 1
              memory: "4Gi"
              cpu: "2"
            requests:
              memory: "2Gi"
              cpu: "1"
          env:
            - name: KAGGLE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: kaggle-credentials
                  key: username
            - name: KAGGLE_KEY
              valueFrom:
                secretKeyRef:
                  name: kaggle-credentials
                  key: key
          volumeMounts:
            - name: datasets
              mountPath: /datasets
            - name: artifacts
              mountPath: /artifacts
            - name: titanic-script
              mountPath: /app/titanic_train.py
              subPath: titanic_train.py
      restartPolicy: Never
      nodeSelector:
        glasslab.io/gpu-vendor: nvidia
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: glasslab.io/gpu-candidate
                    operator: In
                    values:
                      - "true"
      volumes:
        - name: datasets
          persistentVolumeClaim:
            claimName: glasslab-shared-datasets
        - name: artifacts
          persistentVolumeClaim:
            claimName: glasslab-shared-artifacts
        - name: titanic-script
          configMap:
            name: titanic-train-script
  backoffLimit: 1
  ttlSecondsAfterFinished: 86400
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: titanic-train-script
  namespace: glasslab-v2
data:
  titanic_train.py: |
    import os
    import sys
    import pandas as pd
    import numpy as np
    from pathlib import Path
    from sklearn.pipeline import Pipeline
    from sklearn.preprocessing import OneHotEncoder, StandardScaler
    from sklearn.compose import ColumnTransformer
    from sklearn.impute import SimpleImputer
    from sklearn.ensemble import RandomForestClassifier
    from sklearn.model_selection import train_test_split
    from sklearn.metrics import accuracy_score
    import joblib
    
    # Paths
    DATASET_DIR = Path("/datasets/titanic")
    ARTIFACTS_DIR = Path("/artifacts/titanic")
    ARTIFACTS_DIR.mkdir(parents=True, exist_ok=True)
    
    def download_public_data():
        """Download Titanic data from public sources"""
        DATASET_DIR.mkdir(parents=True, exist_ok=True)
        
        train_path = DATASET_DIR / "train.csv"
        test_path = DATASET_DIR / "test.csv"
        
        if train_path.exists() and test_path.exists():
            print("  Using existing downloaded data")
            return True
        
        # Public Kaggle Titanic competition data URLs
        TRAIN_URL = "https://raw.githubusercontent.com/ash3h/Titanic-Dataset/main/train.csv"
        TEST_URL = "https://raw.githubusercontent.com/ash3h/Titanic-Dataset/main/test.csv"
        
        print("Downloading Titanic data from public sources...")
        
        try:
            import requests
            
            print(f"  Training data...")
            response = requests.get(TRAIN_URL)
            if response.status_code == 200:
                train_path.write_bytes(response.content)
                print(f"    ✓ {len(open(train_path).readlines())-1} rows")
            else:
                print(f"    ✗ Failed to download train.csv: {response.status_code}")
                return False
            
            print(f"  Test data...")
            response = requests.get(TEST_URL)
            if response.status_code == 200:
                test_path.write_bytes(response.content)
                print(f"    ✓ {len(open(test_path).readlines())-1} rows")
            else:
                print(f"    ✗ Failed to download test.csv: {response.status_code}")
                return False
        except Exception as e:
            print(f"  Download failed: {e}")
            return False
        
        print(f"\n✓ Data downloaded to: {DATASET_DIR}")
        return True
    
    def validate_csv(file_path, required_column):
        """Validate CSV has required column"""
        header = open(file_path).readline().strip()
        assert required_column in header, f"{file_path} missing column: {required_column}"
        rows = sum(1 for _ in open(file_path)) - 1
        assert rows > 100, f"{file_path} has too few rows: {rows}"
        print(f"  ✓ {Path(file_path).name}: {rows} rows")
    
    def run_training():
        """Run Titanic ML training pipeline"""
        print("=" * 60)
        print("Glasslab v2 - Kaggle Titanic Competition")
        print("=" * 60)
        
        # Download data
        print("\n[1] Downloading Titanic data...")
        if not download_public_data():
            print("Failed to download data")
            return False
        
        # Validate files
        print("\n[2] Validating data files...")
        validate_csv(DATASET_DIR / "train.csv", "Survived")
        validate_csv(DATASET_DIR / "test.csv", "PassengerId")
        
        # Load data
        print("\n[3] Loading Titanic data...")
        train_df = pd.read_csv(DATASET_DIR / "train.csv")
        test_df = pd.read_csv(DATASET_DIR / "test.csv")
        
        print(f"  Train data: {len(train_df)} rows")
        print(f"  Test data: {len(test_df)} rows")
        
        # Prepare features
        y = train_df["Survived"].astype(int)
        X = train_df.drop(columns=["Survived"])
        
        # Split for validation
        X_train, X_valid, y_train, y_valid = train_test_split(
            X, y, test_size=0.25, random_state=42, stratify=y
        )
        
        print(f"  Train split: {len(X_train)} rows")
        print(f"  Valid split: {len(X_valid)} rows")
        
        # Define columns
        numeric_cols = ["Age", "SibSp", "Parch", "Fare"]
        categorical_cols = ["Pclass", "Sex", "Embarked"]
        
        # Create preprocessor
        numeric_transformer = Pipeline(steps=[
            ("imputer", SimpleImputer(strategy="median")),
            ("scaler", StandardScaler())
        ])
        
        categorical_transformer = Pipeline(steps=[
            ("imputer", SimpleImputer(strategy="most_frequent")),
            ("onehot", OneHotEncoder(handle_unknown="ignore"))
        ])
        
        preprocessor = ColumnTransformer(
            transformers=[
                ("num", numeric_transformer, numeric_cols),
                ("cat", categorical_transformer, categorical_cols)
            ]
        )
        
        # Build pipeline
        pipeline = Pipeline(steps=[
            ("preprocessor", preprocessor),
            ("model", RandomForestClassifier(n_estimators=300, random_state=42, min_samples_leaf=1))
        ])
        
        # Train and validate
        print("\n[4] Training Random Forest model...")
        pipeline.fit(X_train, y_train)
        
        predictions_valid = pipeline.predict(X_valid)
        accuracy = accuracy_score(y_valid, predictions_valid)
        print(f"  ✓ Validation accuracy: {accuracy:.4f} ({accuracy*100:.2f}%)")
        
        # Train on full data
        print("\n[5] Retraining on full training set...")
        pipeline.fit(X, y)
        
        # Predict on test set
        print("\n[6] Making predictions on Kaggle test set...")
        predictions_test = pipeline.predict(test_df[X.columns])
        
        # Create submission
        submission = pd.DataFrame({
            "PassengerId": test_df["PassengerId"].astype(int),
            "Survived": predictions_test.astype(int)
        })
        
        # Save submission
        submission_path = ARTIFACTS_DIR / "submission.csv"
        submission.to_csv(submission_path, index=False)
        
        print(f"\n✓ Submission saved: {submission_path}")
        print(f"  Shape: {submission.shape}")
        print(f"  Survived: {submission['Survived'].sum()}")
        print(f"  Survival rate: {submission['Survived'].mean()*100:.1f}%")
        
        # Show sample predictions
        print("\nSample predictions (first 10):")
        print(submission.head(10).to_string(index=False))
        
        # Save model
        model_path = ARTIFACTS_DIR / "model.joblib"
        joblib.dump(pipeline, model_path)
        print(f"\n✓ Model saved: {model_path}")
        
        return True
    
    if __name__ == "__main__":
        success = run_training()
        sys.exit(0 if success else 1)
