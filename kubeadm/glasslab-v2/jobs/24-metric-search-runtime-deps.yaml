apiVersion: batch/v1
kind: Job
metadata:
  name: metric-search-runtime-deps
  namespace: glasslab-v2
  labels:
    app: glasslab-metric-search
spec:
  template:
    spec:
      containers:
        - name: metric-search
          image: python:3.11-slim
          command: ["bash", "-c"]
          args:
            - |
              apt-get update && apt-get install -y git
              pip install torch torchvision faiss-cpu PyYAML timm optuna scikit-learn pytorch-metric-learning mlxtend umap-learn syne-tune "ray[tune]" transformers
              git clone https://github.com/OffensiveGeneric/glasslab-metric-search.git /app
              sed -i 's/art_retrieval_v1/cifar_contrastive_v1/' /app/configs/search_spaces/art_metric_baseline.yaml
              python3 /app/scripts/run_experiment.py \
                --config /app/configs/search_spaces/art_metric_baseline.yaml \
                --output-dir /mnt/artifacts/metric-search-test \
                --epochs 1 \
                --max-train-batches 1 \
                --max-eval-batches 1
          env:
            - name: GLASSLAB_RUNNER_EXPERIMENT_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          resources:
            limits:
              nvidia.com/gpu: 1
              memory: "16Gi"
              cpu: "4"
            requests:
              memory: "8Gi"
              cpu: "2"
          volumeMounts:
            - name: artifacts
              mountPath: /mnt/artifacts
            - name: datasets
              mountPath: /mnt/datasets
      restartPolicy: Never
      imagePullSecrets:
        - name: ghcr-secret
      nodeSelector:
        glasslab.io/gpu-vendor: nvidia
      volumes:
        - name: artifacts
          persistentVolumeClaim:
            claimName: glasslab-shared-artifacts
        - name: datasets
          persistentVolumeClaim:
            claimName: glasslab-shared-datasets
        - name: dml-project
          hostPath:
            path: /Users/glasslab/dml-project
  backoffLimit: 1
  ttlSecondsAfterFinished: 86400
