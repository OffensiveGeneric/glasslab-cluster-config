apiVersion: batch/v1
kind: Job
metadata:
  name: metric-search-with-memory
  namespace: glasslab-v2
  labels:
    app: glasslab-metric-search
spec:
  template:
    spec:
      containers:
        - name: metric-search
          image: ghcr.io/offensivegeneric/glasslab-metric-search:latest
          command: ["bash", "-c"]
          args:
            - |
              pip install --no-cache-dir PyYAML timm optuna scikit-learn pytorch-metric-learning mlxtend umap-learn faiss-cpu syne-tune "ray[tune]" transformers && \
              sed -i 's/art_retrieval_v1/cifar_contrastive_v1/' /app/configs/search_spaces/art_metric_baseline.yaml && \
              python3 /app/scripts/run_experiment.py \
                --config /app/configs/search_spaces/art_metric_baseline.yaml \
                --output-dir /mnt/artifacts/metric-search-test \
                --epochs 1 \
                --max-train-batches 1 \
                --max-eval-batches 1
          env:
            - name: GLASSLAB_RUNNER_EXPERIMENT_ID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          resources:
            limits:
              nvidia.com/gpu: 1
              memory: "8Gi"
              cpu: "2"
            requests:
              memory: "4Gi"
              cpu: "1"
          volumeMounts:
            - name: artifacts
              mountPath: /mnt/artifacts
            - name: datasets
              mountPath: /mnt/datasets
      restartPolicy: Never
      imagePullSecrets:
        - name: ghcr-secret
      nodeSelector:
        glasslab.io/gpu-vendor: nvidia
      volumes:
        - name: artifacts
          persistentVolumeClaim:
            claimName: glasslab-shared-artifacts
        - name: datasets
          persistentVolumeClaim:
            claimName: glasslab-shared-datasets
  backoffLimit: 1
  ttlSecondsAfterFinished: 86400
