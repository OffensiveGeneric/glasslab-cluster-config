---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: glasslab-gpu-runner
  namespace: glasslab-v2
automountServiceAccountToken: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: glasslab-v2-runner-config
  namespace: glasslab-v2
data:
  GLASSLAB_RUNNER_MODEL_ID: "mlx-community/Qwen3-Coder-Next-4bit"
  GLASSLAB_RUNNER_CONTEXT_LENGTH: "262144"
  GLASSLAB_RUNNER_MAX_TOKENS: "2048"
  GLASSLAB_RUNNER_TEMPERATURE: "0.7"
  GLASSLAB_RUNNER_TOP_P: "0.9"
  GLASSLAB_RUNNER_SHARDING: "Pipeline"
  GLASSLAB_RUNNER_RUNTIME: "MlxJaccl"
  GLASSLAB_RUNNER_DATASET: "cifar100"
  GLASSLAB_RUNNER_SEEN_CLASSES: "80"
  GLASSLAB_RUNNER_UNSEEN_CLASSES: "20"
  GLASSLAB_RUNNER_SEEDS: "3,5"
  GLASSLAB_RUNNER_METRICS: "grouped_recall_at_k,opis,ami,ari,nmi,silhouette"
  GLASSLAB_RUNNER_AUGMENTATION: "RandomResizedCrop+ColorJitter+RandomHorizontalFlip"
---
apiVersion: v1
kind: Secret
metadata:
  name: glasslab-v2-runner
  namespace: glasslab-v2
type: Opaque
data:
  GLASSLAB_RUNNER_STORE_POSTGRES_DSN: cG9zdGdyZXM6Ly9ncmFzc2xhYjogZ3Jhc3NsYWJwYXNzQHBvc3RncmVzLnNsLWdyYXNzbGFiLXYyLnN2Yy5jbHVzdGVyLmxvY2FsOjU0MzIvZ2xhc3NsYWJfZGF0YQ==
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: runner-model-cache
  namespace: glasslab-v2
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: managed-nfs-storage
  resources:
    requests:
      storage: 50Gi
---
apiVersion: v1
kind: Service
metadata:
  name: glasslab-gpu-runner
  namespace: glasslab-v2
spec:
  selector:
    app.kubernetes.io/name: glasslab-gpu-runner
  ports:
    - protocol: TCP
      port: 52415
      targetPort: http
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: glasslab-gpu-runner
  namespace: glasslab-v2
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: glasslab-gpu-runner
  template:
    metadata:
      labels:
        app.kubernetes.io/name: glasslab-gpu-runner
    spec:
      enableServiceLinks: false
      runtimeClassName: nvidia
      nodeSelector:
        glasslab.io/gpu-candidate: "true"
        kubernetes.io/hostname: node02
      containers:
        - name: runner
          image: glasslab/runner:gpu-v1
          imagePullPolicy: IfNotPresent
          command:
            - python3
            - -m
            - app.main
          envFrom:
            - configMapRef:
                name: glasslab-v2-runner-config
          env:
            - name: GLASSLAB_RUNNER_STORE_POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: glasslab-v2-runner
                  key: GLASSLAB_RUNNER_STORE_POSTGRES_DSN
                  optional: true
            - name: GLASSLAB_RUNNER_MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: glasslab-v2-minio
                  key: MINIO_ROOT_USER
                  optional: true
            - name: GLASSLAB_RUNNER_MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: glasslab-v2-minio
                  key: MINIO_ROOT_PASSWORD
                  optional: true
            - name: GLASSLAB_RUNNER_MINIO_ENDPOINT
              value: glasslab-minio.glasslab-v2.svc.cluster.local:9000
            - name: GLASSLAB_RUNNER_PORT
              value: "52415"
          ports:
            - containerPort: 52415
              name: http
          resources:
            requests:
              cpu: "2"
              memory: 16Gi
              nvidia.com/gpu: "1"
            limits:
              cpu: "4"
              memory: 32Gi
              nvidia.com/gpu: "1"
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
          volumeMounts:
            - name: artifacts-volume
              mountPath: /mnt/artifacts
            - name: model-cache
              mountPath: /root/.cache/huggingface
            - name: tmp-volume
              mountPath: /tmp
      volumes:
        - name: artifacts-volume
          persistentVolumeClaim:
            claimName: glasslab-shared-artifacts
        - name: model-cache
          persistentVolumeClaim:
            claimName: runner-model-cache
        - name: tmp-volume
          emptyDir: {}
