apiVersion: apps/v1
kind: Deployment
metadata:
  name: glasslab-gpu-runner
  namespace: glasslab-v2
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: glasslab-gpu-runner
  template:
    metadata:
      labels:
        app.kubernetes.io/name: glasslab-gpu-runner
    spec:
      enableServiceLinks: false
      runtimeClassName: nvidia
      nodeSelector:
        glasslab.io/gpu-candidate: "true"
        kubernetes.io/hostname: node02
      containers:
        - name: runner
          image: glasslab/runner:gpu-v1
          imagePullPolicy: IfNotPresent
          command:
            - python3
            - -m
            - app.main
          envFrom:
            - configMapRef:
                name: glasslab-v2-runner-config
          env:
            - name: GLASSLAB_RUNNER_STORE_POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: glasslab-v2-runner
                  key: GLASSLAB_RUNNER_STORE_POSTGRES_DSN
                  optional: true
            - name: GLASSLAB_RUNNER_MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: glasslab-v2-minio
                  key: MINIO_ROOT_USER
                  optional: true
            - name: GLASSLAB_RUNNER_MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: glasslab-v2-minio
                  key: MINIO_ROOT_PASSWORD
                  optional: true
            - name: GLASSLAB_RUNNER_MINIO_ENDPOINT
              value: glasslab-minio.glasslab-v2.svc.cluster.local:9000
            - name: GLASSLAB_RUNNER_PORT
              value: "52415"
          ports:
            - containerPort: 52415
              name: http
          resources:
            requests:
              cpu: "2"
              memory: 16Gi
              nvidia.com/gpu: "1"
            limits:
              cpu: "4"
              memory: 32Gi
              nvidia.com/gpu: "1"
          startupProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
          volumeMounts:
            - name: artifacts-volume
              mountPath: /mnt/artifacts
            - name: model-cache
              mountPath: /root/.cache/huggingface
            - name: tmp-volume
              mountPath: /tmp
      volumes:
        - name: artifacts-volume
          persistentVolumeClaim:
            claimName: glasslab-shared-artifacts
        - name: model-cache
          persistentVolumeClaim:
            claimName: runner-model-cache
        - name: tmp-volume
          emptyDir: {}
