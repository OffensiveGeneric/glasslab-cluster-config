apiVersion: apps/v1
kind: Deployment
metadata:
  name: glasslab-research-command-router
  namespace: glasslab-v2
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: glasslab-research-command-router
  template:
    metadata:
      labels:
        app.kubernetes.io/name: glasslab-research-command-router
    spec:
      imagePullSecrets:
        - name: glasslab-ghcr-pull
      containers:
        - name: research-command-router
          image: ghcr.io/offensivegeneric/glasslab-research-command-router:0.1.4
          imagePullPolicy: IfNotPresent
          env:
            - name: GLASSLAB_RESEARCH_COMMAND_ROUTER_WORKFLOW_API_URL
              value: http://glasslab-workflow-api.glasslab-v2.svc.cluster.local:8080
            - name: GLASSLAB_RESEARCH_COMMAND_ROUTER_TIMEOUT_SECONDS
              value: "120"
          ports:
            - containerPort: 8095
              name: http
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
