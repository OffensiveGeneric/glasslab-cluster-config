apiVersion: apps/v1
kind: Deployment
metadata:
  name: glasslab-research-ingress
  namespace: glasslab-v2
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: glasslab-research-ingress
  template:
    metadata:
      labels:
        app.kubernetes.io/name: glasslab-research-ingress
    spec:
      imagePullSecrets:
        - name: glasslab-ghcr-pull
      containers:
        - name: research-ingress
          image: ghcr.io/offensivegeneric/glasslab-research-ingress:0.1.1
          imagePullPolicy: IfNotPresent
          env:
            - name: GLASSLAB_RESEARCH_INGRESS_COMMAND_ROUTER_URL
              value: http://glasslab-research-command-router.glasslab-v2.svc.cluster.local:8095
            - name: GLASSLAB_RESEARCH_INGRESS_TIMEOUT_SECONDS
              value: "120"
            - name: GLASSLAB_RESEARCH_INGRESS_DEFAULT_CHANNEL
              value: whatsapp
          ports:
            - containerPort: 8096
              name: http
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
