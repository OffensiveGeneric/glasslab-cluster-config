apiVersion: apps/v1
kind: Deployment
metadata:
  name: glasslab-openclaw
  namespace: glasslab-v2
spec:
  replicas: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: glasslab-openclaw
  template:
    metadata:
      labels:
        app.kubernetes.io/name: glasslab-openclaw
    spec:
      automountServiceAccountToken: false
      enableServiceLinks: false
      serviceAccountName: glasslab-openclaw
      initContainers:
        - name: unpack-config
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              set -eu
              mkdir -p /runtime
              tar -xzf /config-archive/openclaw-runtime.tar.gz -C /runtime
              test -f /runtime/openclaw.json
              test -f /runtime/RUNTIME-CONTRACT.md
              test -f /runtime/workspaces/operator/IDENTITY.md
              test -f /runtime/workspaces/literature/IDENTITY.md
              test -f /runtime/workspaces/designer/IDENTITY.md
              test -f /runtime/workspaces/reporter/IDENTITY.md
          volumeMounts:
            - name: exported-config
              mountPath: /config-archive
            - name: runtime-config
              mountPath: /runtime
      containers:
        - name: openclaw
          image: ghcr.io/openclaw/openclaw:latest
          imagePullPolicy: Always
          env:
            - name: OPENCLAW_CONFIG_PATH
              value: /var/lib/openclaw/runtime/openclaw.json
            - name: OPENCLAW_STATE_DIR
              value: /var/lib/openclaw/state
            - name: NODE_OPTIONS
              value: --max-old-space-size=3072
            - name: OPENCLAW_GATEWAY_TOKEN
              valueFrom:
                secretKeyRef:
                  name: glasslab-openclaw
                  key: OPENCLAW_GATEWAY_TOKEN
            - name: OPENCLAW_VLLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: glasslab-openclaw
                  key: OPENCLAW_VLLM_API_KEY
            - name: OPENCLAW_WHATSAPP_OWNER
              valueFrom:
                secretKeyRef:
                  name: glasslab-openclaw
                  key: OPENCLAW_WHATSAPP_OWNER
                  optional: true
          resources:
            requests:
              cpu: "1"
              memory: 2Gi
            limits:
              cpu: "2"
              memory: 4Gi
          ports:
            - containerPort: 18789
              name: http
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          startupProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 24
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          volumeMounts:
            - name: runtime-config
              mountPath: /var/lib/openclaw/runtime
              readOnly: true
            - name: state
              mountPath: /var/lib/openclaw/state
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: exported-config
          configMap:
            name: glasslab-openclaw-config
            defaultMode: 0444
        - name: runtime-config
          emptyDir: {}
        - name: state
          emptyDir: {}
        - name: tmp
          emptyDir: {}
