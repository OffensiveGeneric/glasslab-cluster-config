apiVersion: v1
kind: PersistentVolume
metadata:
  name: glasslab-v2-postgres-data-pv
spec:
  capacity:
    storage: 20Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  claimRef:
    namespace: glasslab-v2
    name: glasslab-postgres-data
  local:
    path: /var/lib/glasslab-v2/postgres
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - node01
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: glasslab-postgres-data
  namespace: glasslab-v2
spec:
  storageClassName: ""
  volumeName: glasslab-v2-postgres-data-pv
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
