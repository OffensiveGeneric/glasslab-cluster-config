# Example only.
# This file documents a non-production test path for evaluating
# OpenClaw writable state on shared NFS-backed storage.
#
# It is not part of the default deploy path.
#
# Intended use:
# - create separate PV/PVC objects for a migration test
# - patch or branch the OpenClaw Deployment to use this PVC
# - validate restart behavior and session continuity
# - roll back to the current local-PV claim if the test is unsatisfactory
---
apiVersion: v1
kind: PersistentVolume
metadata:
  name: glasslab-v2-openclaw-shared-state-test-pv
spec:
  capacity:
    storage: 20Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: ""
  mountOptions:
    - nfsvers=4.1
  claimRef:
    namespace: glasslab-v2
    name: glasslab-openclaw-state-shared-test
  nfs:
    server: 192.168.1.207
    path: /volume1/backup/glasslab-v2/openclaw-state-test
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: glasslab-openclaw-state-shared-test
  namespace: glasslab-v2
spec:
  storageClassName: ""
  volumeName: glasslab-v2-openclaw-shared-state-test-pv
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 20Gi
