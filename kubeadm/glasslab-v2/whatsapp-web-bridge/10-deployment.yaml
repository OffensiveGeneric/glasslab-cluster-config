apiVersion: apps/v1
kind: Deployment
metadata:
  name: glasslab-whatsapp-web-bridge
  namespace: glasslab-v2
spec:
  replicas: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: glasslab-whatsapp-web-bridge
  template:
    metadata:
      labels:
        app.kubernetes.io/name: glasslab-whatsapp-web-bridge
    spec:
      nodeSelector:
        kubernetes.io/hostname: node05
      imagePullSecrets:
        - name: glasslab-ghcr-pull
      initContainers:
        - name: seed-auth
          image: busybox:1.36
          command:
            - sh
            - -lc
            - |
              mkdir -p /state/default
              if [ ! -f /state/default/creds.json ] && [ -f /seed/auth.tgz ]; then
                tar -xzf /seed/auth.tgz -C /state/default
              fi
          volumeMounts:
            - name: state
              mountPath: /state
            - name: auth-seed
              mountPath: /seed
              readOnly: true
      containers:
        - name: whatsapp-web-bridge
          image: ghcr.io/offensivegeneric/glasslab-whatsapp-web-bridge:0.1.0-local
          imagePullPolicy: IfNotPresent
          env:
            - name: PORT
              value: "8098"
            - name: GLASSLAB_WHATSAPP_WEB_BRIDGE_STATE_DIR
              value: /var/lib/glasslab-whatsapp-web
            - name: GLASSLAB_WHATSAPP_WEB_BRIDGE_AUTH_DIR
              value: /var/lib/glasslab-whatsapp-web/default
            - name: GLASSLAB_WHATSAPP_WEB_BRIDGE_GATEWAY_URL
              value: http://glasslab-whatsapp-gateway.glasslab-v2.svc.cluster.local:8097
            - name: GLASSLAB_WHATSAPP_WEB_BRIDGE_BASE_URL
              value: http://glasslab-whatsapp-web-bridge.glasslab-v2.svc.cluster.local:8098
          ports:
            - containerPort: 8098
              name: http
          volumeMounts:
            - name: state
              mountPath: /var/lib/glasslab-whatsapp-web
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: state
          emptyDir: {}
        - name: auth-seed
          secret:
            secretName: glasslab-whatsapp-web-auth
            optional: true
