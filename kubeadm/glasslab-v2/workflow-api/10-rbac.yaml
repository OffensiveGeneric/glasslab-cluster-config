apiVersion: v1
kind: ServiceAccount
metadata:
  name: glasslab-workflow-api
  namespace: glasslab-v2
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: glasslab-workflow-api-job-submitter
  namespace: glasslab-v2
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: glasslab-workflow-api-job-submitter
  namespace: glasslab-v2
subjects:
  - kind: ServiceAccount
    name: glasslab-workflow-api
    namespace: glasslab-v2
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: glasslab-workflow-api-job-submitter
