apiVersion: apps/v1
kind: Deployment
metadata:
  name: glasslab-workflow-api
  namespace: glasslab-v2
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: glasslab-workflow-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: glasslab-workflow-api
    spec:
      nodeSelector:
        kubernetes.io/hostname: node03
      containers:
        - name: workflow-api
          image: ghcr.io/offensivegeneric/glasslab-workflow-api:0.1.0
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: glasslab-v2-workflow-api-config
          ports:
            - containerPort: 8080
              name: http
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
