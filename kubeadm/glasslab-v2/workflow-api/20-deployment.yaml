apiVersion: apps/v1
kind: Deployment
metadata:
  name: glasslab-workflow-api
  namespace: glasslab-v2
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: glasslab-workflow-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: glasslab-workflow-api
    spec:
      nodeSelector:
        kubernetes.io/hostname: node05
      serviceAccountName: glasslab-workflow-api
      imagePullSecrets:
        - name: glasslab-ghcr-pull
      containers:
        - name: workflow-api
          image: ghcr.io/offensivegeneric/glasslab-workflow-api:0.1.94-local
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: glasslab-v2-workflow-api-config
          env:
            - name: GLASSLAB_WORKFLOW_API_STORE_POSTGRES_DSN
              valueFrom:
                secretKeyRef:
                  name: glasslab-v2-workflow-api
                  key: GLASSLAB_WORKFLOW_API_STORE_POSTGRES_DSN
                  optional: true
            - name: GLASSLAB_WORKFLOW_API_MINIO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: glasslab-v2-minio
                  key: MINIO_ROOT_USER
                  optional: true
            - name: GLASSLAB_WORKFLOW_API_MINIO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: glasslab-v2-minio
                  key: MINIO_ROOT_PASSWORD
                  optional: true
            - name: GLASSLAB_WORKFLOW_API_MINIO_ENDPOINT
              value: glasslab-minio.glasslab-v2.svc.cluster.local:9000
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            - name: artifacts-volume
              mountPath: /mnt/artifacts
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: artifacts-volume
          persistentVolumeClaim:
            claimName: glasslab-shared-artifacts
