apiVersion: apps/v1
kind: Deployment
metadata:
  name: glasslab-assessment-agent
  namespace: glasslab-v2
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: glasslab-assessment-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: glasslab-assessment-agent
    spec:
      imagePullSecrets:
        - name: glasslab-ghcr-pull
      containers:
        - name: assessment-agent
          image: ghcr.io/offensivegeneric/glasslab-assessment-agent:0.1.0
          imagePullPolicy: IfNotPresent
          env:
            - name: GLASSLAB_ASSESSMENT_AGENT_PROVIDER_API
              value: openai-compatible
            - name: GLASSLAB_ASSESSMENT_AGENT_PROVIDER_BASE_URL
              value: http://192.168.1.21:52415
            - name: GLASSLAB_ASSESSMENT_AGENT_MODEL
              value: mlx-community/Qwen3-Coder-Next-4bit
            - name: GLASSLAB_ASSESSMENT_AGENT_TIMEOUT_SECONDS
              value: "120"
          ports:
            - containerPort: 8092
              name: http
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
