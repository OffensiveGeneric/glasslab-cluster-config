apiVersion: v1
kind: ConfigMap
metadata:
  name: glasslab-v2-workflow-api-config
  namespace: glasslab-v2
data:
  GLASSLAB_WORKFLOW_API_REGISTRY_DIR: /app/services/workflow-registry/definitions
  GLASSLAB_WORKFLOW_API_STORE_BACKEND: postgres
  GLASSLAB_WORKFLOW_API_ALLOW_INMEMORY_STORE: "false"
  GLASSLAB_WORKFLOW_API_STORE_JSON_PATH: /mnt/artifacts/workflow-api/state/run-store.json
  GLASSLAB_WORKFLOW_API_RUNNER_NAMESPACE: glasslab-v2
  GLASSLAB_WORKFLOW_API_DEFAULT_SUBMITTED_BY: glasslab-operator
  GLASSLAB_WORKFLOW_API_JOB_SUBMISSION_MODE: kubernetes
  GLASSLAB_WORKFLOW_API_RUNNER_SERVICE_ACCOUNT_NAME: default
  GLASSLAB_WORKFLOW_API_RUNNER_IMAGE_PULL_POLICY: IfNotPresent
  GLASSLAB_WORKFLOW_API_RUNNER_BACKOFF_LIMIT: "0"
  GLASSLAB_WORKFLOW_API_RUNNER_JOB_TTL_SECONDS: "86400"
  GLASSLAB_WORKFLOW_API_DATASET_PVC_NAME: glasslab-shared-datasets
  GLASSLAB_WORKFLOW_API_DATASET_MOUNT_PATH: /mnt/datasets
  GLASSLAB_WORKFLOW_API_ARTIFACTS_PVC_NAME: glasslab-shared-artifacts
  GLASSLAB_WORKFLOW_API_ARTIFACTS_MOUNT_PATH: /mnt/artifacts
  GLASSLAB_WORKFLOW_API_IMAGE_PULL_SECRET_NAME: glasslab-ghcr-pull
  GLASSLAB_WORKFLOW_API_USER_PRIORITY_CLASS_NAME: glasslab-user-high
  GLASSLAB_WORKFLOW_API_AUTONOMOUS_PRIORITY_CLASS_NAME: glasslab-autonomous-low
  GLASSLAB_WORKFLOW_API_INTAKE_AGENT_ENABLED: "false"
  GLASSLAB_WORKFLOW_API_INTAKE_AGENT_URL: http://glasslab-intake-agent.glasslab-v2.svc.cluster.local:8090/normalize-intake
  GLASSLAB_WORKFLOW_API_INTAKE_AGENT_TIMEOUT_SECONDS: "30"
  GLASSLAB_WORKFLOW_API_INTERPRETATION_AGENT_ENABLED: "true"
  GLASSLAB_WORKFLOW_API_INTERPRETATION_AGENT_URL: http://glasslab-interpretation-agent.glasslab-v2.svc.cluster.local:8091/interpret-intake
  GLASSLAB_WORKFLOW_API_INTERPRETATION_AGENT_TIMEOUT_SECONDS: "90"
  GLASSLAB_WORKFLOW_API_ASSESSMENT_AGENT_ENABLED: "false"
  GLASSLAB_WORKFLOW_API_ASSESSMENT_AGENT_URL: http://glasslab-assessment-agent.glasslab-v2.svc.cluster.local:8092/assess-interpretation
  GLASSLAB_WORKFLOW_API_ASSESSMENT_AGENT_TIMEOUT_SECONDS: "45"
  GLASSLAB_WORKFLOW_API_DESIGN_AGENT_ENABLED: "false"
  GLASSLAB_WORKFLOW_API_DESIGN_AGENT_URL: http://glasslab-design-agent.glasslab-v2.svc.cluster.local:8093/draft-design
  GLASSLAB_WORKFLOW_API_DESIGN_AGENT_TIMEOUT_SECONDS: "45"
  GLASSLAB_WORKFLOW_API_CODING_NOTEBOOK_AGENT_ENABLED: "true"
  GLASSLAB_WORKFLOW_API_CODING_NOTEBOOK_AGENT_URL: http://192.168.1.12:11434/api/chat
  GLASSLAB_WORKFLOW_API_CODING_NOTEBOOK_AGENT_TIMEOUT_SECONDS: "90"
  GLASSLAB_WORKFLOW_API_CODING_NOTEBOOK_MODEL: qwen2.5-coder:14b
  GLASSLAB_WORKFLOW_API_RANKER_ENABLED: "false"
  GLASSLAB_WORKFLOW_API_RANKER_URL: http://192.168.1.12:8181/rank/workflow-family
  GLASSLAB_WORKFLOW_API_RANKER_TIMEOUT_SECONDS: "15"
  GLASSLAB_WORKFLOW_API_RANKER_MIN_TOP_SCORE: "0.75"
  GLASSLAB_WORKFLOW_API_RANKER_MIN_SCORE_GAP: "0.10"
  GLASSLAB_WORKFLOW_API_SOURCE_DOCUMENT_STORAGE_MODE: filesystem
  GLASSLAB_WORKFLOW_API_SOURCE_DOCUMENT_BUCKET: glasslab-source-documents
  GLASSLAB_WORKFLOW_API_MINIO_ENDPOINT: glasslab-minio.glasslab-v2.svc.cluster.local:9000
