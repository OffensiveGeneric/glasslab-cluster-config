apiVersion: apps/v1
kind: Deployment
metadata:
  name: glasslab-whatsapp-gateway
  namespace: glasslab-v2
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: glasslab-whatsapp-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: glasslab-whatsapp-gateway
    spec:
      nodeSelector:
        kubernetes.io/hostname: node05
      imagePullSecrets:
        - name: glasslab-ghcr-pull
      containers:
        - name: whatsapp-gateway
          image: ghcr.io/offensivegeneric/glasslab-whatsapp-gateway:0.1.2-local
          imagePullPolicy: IfNotPresent
          env:
            - name: GLASSLAB_WHATSAPP_GATEWAY_RESEARCH_INGRESS_URL
              value: http://glasslab-research-ingress.glasslab-v2.svc.cluster.local:8096
            - name: GLASSLAB_WHATSAPP_GATEWAY_TIMEOUT_SECONDS
              value: "120"
            - name: GLASSLAB_WHATSAPP_GATEWAY_CHAT_BACKEND_URL
              value: http://192.168.1.12:11434/api/chat
            - name: GLASSLAB_WHATSAPP_GATEWAY_CHAT_MODEL
              value: qwen3:14b
            - name: GLASSLAB_WHATSAPP_GATEWAY_CHAT_TIMEOUT_SECONDS
              value: "120"
            - name: GLASSLAB_WHATSAPP_GATEWAY_CHAT_SYSTEM_PROMPT
              value: >-
                You are the Glasslab assistant. Help researchers think through
                machine learning experiments, compare methods, interpret run
                results, and plan next steps. Assume "artist similarity" means
                visual art or paintings unless the user clearly says music.
                Do not claim to execute actions unless a deterministic command
                is used. Suggest commands like !start, !run, !next, !compare,
                !status, !new-session, or !add-pdf when useful.
            - name: GLASSLAB_WHATSAPP_GATEWAY_DM_POLICY
              value: allowlist
            - name: GLASSLAB_WHATSAPP_GATEWAY_ALLOW_FROM
              valueFrom:
                secretKeyRef:
                  name: glasslab-openclaw
                  key: OPENCLAW_WHATSAPP_OWNER
                  optional: true
            - name: GLASSLAB_WHATSAPP_GATEWAY_GROUP_POLICY
              value: disabled
            - name: GLASSLAB_WHATSAPP_GATEWAY_DEFAULT_CHANNEL
              value: whatsapp
            - name: GLASSLAB_WHATSAPP_GATEWAY_BASE_URL
              value: http://glasslab-whatsapp-gateway.glasslab-v2.svc.cluster.local:8097
            - name: GLASSLAB_WHATSAPP_GATEWAY_STATE_DIR
              value: /var/lib/glasslab-whatsapp-gateway
          ports:
            - containerPort: 8097
              name: http
          volumeMounts:
            - name: state
              mountPath: /var/lib/glasslab-whatsapp-gateway
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: state
          emptyDir: {}
