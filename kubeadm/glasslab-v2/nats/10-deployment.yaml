apiVersion: apps/v1
kind: Deployment
metadata:
  name: glasslab-nats
  namespace: glasslab-v2
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: glasslab-nats
  template:
    metadata:
      labels:
        app.kubernetes.io/name: glasslab-nats
    spec:
      containers:
        - name: nats
          image: nats:2.10-alpine
          imagePullPolicy: IfNotPresent
          args:
            - -js
            - -m
            - "8222"
          ports:
            - containerPort: 4222
              name: client
            - containerPort: 8222
              name: monitoring
          readinessProbe:
            tcpSocket:
              port: client
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: client
            initialDelaySeconds: 15
            periodSeconds: 20
          volumeMounts:
            - name: nats-data
              mountPath: /data
      volumes:
        - name: nats-data
          emptyDir: {}
