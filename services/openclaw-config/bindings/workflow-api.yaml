name: workflow-api
base_url: http://glasslab-workflow-api.glasslab-v2.svc.cluster.local:8080
routes:
  list_workflows: GET /workflow-families
  create_intake: POST /intakes
  get_latest_intake: GET /intakes/latest
  run_research_problem_pipeline: POST /paper-pipelines/from-research-problem
  stage_research_problem: POST /research-problems
  get_latest_research_problem: GET /research-problems/latest
  create_research_session: POST /research-sessions
  list_research_sessions: GET /research-sessions
  get_latest_research_session: GET /research-sessions/latest
  get_research_session_bootstrap_status: GET /research-sessions/bootstrap-status
  get_latest_research_session_context: GET /research-sessions/latest/context
  create_research_session_from_latest_problem: POST /research-sessions/from-latest-research-problem
  stage_research_problem_from_latest_session: POST /research-sessions/latest/skills/research-problem
  create_paper_intake_queue_from_latest_session_problem: POST /research-sessions/latest/skills/literature-harvest
  stage_next_intake_from_latest_session_queue: POST /research-sessions/latest/skills/paper-intake
  get_latest_session_paper_intake_queue: GET /research-sessions/latest/paper-intake-queue
  get_latest_session_source_document: GET /research-sessions/latest/source-document
  get_latest_session_intake: GET /research-sessions/latest/intake
  run_latest_research_problem_pipeline: POST /paper-pipelines/from-latest-research-problem
  create_paper_intake_queue_from_research_problem: POST /paper-intake-queues/from-research-problem
  get_latest_paper_intake_queue: GET /paper-intake-queues/latest
  stage_next_intake_from_queue: POST /paper-intake-queues/{queue_id}/stage-next-intake
  get_latest_source_document: GET /source-documents/latest
  get_latest_operation: GET /operations/latest
  create_interpretation_from_latest_session: POST /research-sessions/latest/skills/interpretation
  get_latest_session_interpretation: GET /research-sessions/latest/interpretation
  create_assessment_from_latest_session: POST /research-sessions/latest/skills/assessment
  get_latest_session_assessment: GET /research-sessions/latest/assessment
  run_fresh_paper_pipeline: POST /paper-pipelines/fresh-paper
  create_design_draft_from_latest_session: POST /research-sessions/latest/skills/design
  review_latest_design_draft: POST /design-drafts/latest/review
  get_latest_session_design: GET /research-sessions/latest/design
  get_workflow_execution_preflight: GET /workflow-families/{workflow_id}/execution-preflight
  create_run_from_latest_design_draft: POST /runs/from-latest-design-draft
  create_run: POST /runs
  get_run: GET /runs/{run_id}
  get_artifacts: GET /runs/{run_id}/artifacts
  get_logs: GET /runs/{run_id}/logs
paper_intake_request:
  raw_request: Start a bounded paper-to-validation intake for the approved Titanic benchmark path.
  source_refs:
    - https://www.kaggle.com/competitions/titanic
  source_type: paper-link
  notes:
    - Use the approved Titanic dataset path for the first intake-to-design validation.
    - Keep the workflow family inside the approved Glasslab registry.
  submitted_by: openclaw-operator
literature_intake_request:
  raw_request: Start a bounded literature-to-experiment intake for an approved paper-derived experiment path.
  source_refs:
    - https://example.org/approved-paper-source
  source_type: paper-link
  notes:
    - Keep the request mapped to the approved literature-to-experiment workflow family.
    - Expect dataset selection to remain unresolved until backend review resolves it explicitly.
  submitted_by: openclaw-operator
replication_intake_request:
  raw_request: Start a bounded replication intake for an approved replication-lite path.
  source_refs:
    - https://example.org/approved-paper-source
    - https://github.com/example/approved-replication
  source_type: paper-link
  notes:
    - Keep the request mapped to the approved replication-lite workflow family.
    - Expect repository, dataset, and evaluation inputs to require explicit review before execution.
  submitted_by: openclaw-operator
literature_review_request:
  resolved_inputs:
    dataset_uri: s3://datasets/paper-derived/train.csv
  review_notes:
    - Applied the approved literature-to-experiment dataset binding for the repo-managed path.
validation_run_request:
  workflow_id: generic-tabular-benchmark
  objective: Benchmark logistic regression on the seeded Titanic fixture dataset.
  inputs:
    dataset_name: titanic-fixture
    train_uri: s3://datasets/titanic/train.csv
    test_uri: s3://datasets/titanic/test.csv
    target_column: Survived
  models:
    - logistic_regression
notes:
  - Use only approved workflow IDs from the registry.
  - Route Tier 3 workflows for human approval before submitting runs.
  - Keep the first intake-to-design operator path repo-managed and no-arg.
  - Use the research-problem pipeline when the operator starts from a casual natural-language research problem instead of a specific paper.
