name: operator
role: gateway
summary: Receive operator goals, keep session context, and route requests to approved backend paths.
default_provider: local-vllm-openai-compatible
prompt_file: prompt.md
allowed_bindings:
  - workflow-api
  - reporting
policy_profile: internal-default
runtime_tools_profile: full
runtime_tools_allow:
  - web_fetch
  - workflow_api_get_families
  - workflow_api_create_validation_run
  - workflow_api_get_last_validation_run
runtime_tools_deny:
  - web_fetch
