name: operator
role: gateway
summary: Receive operator goals, keep session context, and route requests to approved backend paths.
default_provider: local-ollama-native
prompt_file: prompt.md
allowed_bindings:
  - workflow-api
  - reporting
policy_profile: internal-default
runtime_tools_profile: full
runtime_tools_allow:
  - workflow_api_dispatch_latest_user_message
  - workflow_api_get_latest_research_session_context
  - workflow_api_get_latest_operation
runtime_tools_deny:
  - web_fetch
