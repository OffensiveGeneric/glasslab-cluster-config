name: CI Configs

on:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - "kubeadm/**/*.yml"
      - "kubeadm/**/*.yaml"
      - "**/*.json"
      - "**/*.yml"
      - "**/*.yaml"
      - "scripts/validate-configs.py"
  push:
    branches: [main]
    paths:
      - ".github/workflows/**"
      - "kubeadm/**/*.yml"
      - "kubeadm/**/*.yaml"
      - "**/*.json"
      - "**/*.yml"
      - "**/*.yaml"
      - "scripts/validate-configs.py"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-configs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-configs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install parser dependency
        run: |
          python -m pip install --upgrade pip
          pip install PyYAML

      - name: Validate YAML and JSON syntax
        run: python scripts/validate-configs.py
