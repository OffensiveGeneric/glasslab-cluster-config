name: Validate All CI/CD Pipelines

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/validate-all-pipelines.yml
  workflow_dispatch:

jobs:
  validate-all-pipelines:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Summary
        run: |
          python << 'PYEOF'
          import os
          
          workflows_dir = '.github/workflows'
          workflows = [f for f in os.listdir(workflows_dir) if f.endswith('.yml')]
          
          print(f"CI/CD Pipelines Summary")
          print(f"{'=' * 40}")
          print(f"Total workflows: {len(workflows)}")
          print("")
          
          # Categorize
          categories = {
              'Build': [],
              'Test': [],
              'Validate': [],
              'Release': [],
              'Deploy': [],
          }
          
          for workflow in workflows:
              filepath = os.path.join(workflows_dir, workflow)
              with open(filepath) as f:
                  content = f.read()
              
              for category, list_ in categories.items():
                  if category.lower() in content.lower():
                      list_.append(workflow)
          
          print("Workflows by category:")
          for category, list_ in sorted(categories.items()):
              if list_:
                  print(f"  {category}: {len(list_)}")
                  for w in sorted(list_):
                      print(f"    - {w}")
          
          print(f"\nTotal: {len(workflows)} workflows")
          PYEOF
