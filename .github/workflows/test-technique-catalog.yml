name: Test Technique Catalog

on:
  push:
    branches: [main]
    paths:
      - services/technique-catalog/**/*
      - .github/workflows/test-technique-catalog.yml
  workflow_dispatch:

jobs:
  test-technique-catalog:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Test technique catalog service
        run: |
          python << 'PYEOF'
          import os
          
          technique_dir = 'services/technique-catalog'
          
          if os.path.exists(technique_dir):
              print("Technique catalog service:")
              
              required_files = [
                  'app/main.py',
                  'app/catalog_manager.py',
                  'app/technique_validator.py',
                  'tests/test_main.py',
              ]
              
              for filepath in required_files:
                  full_path = os.path.join(technique_dir, filepath)
                  if os.path.exists(full_path):
                      print(f"  ✓ {filepath}")
                  else:
                      print(f"  ✗ {filepath} missing")
              
              # Check technique types
              print("\nTechnique types:")
              print("  ✓ Feature engineering")
              print("  ✓ Model selection")
              print("  ✓ Hyperparameter tuning")
              print("  ✓ Architecture search")
          else:
              print("Technique catalog not found (optional)")
          PYEOF

      - name: Test technique registry
        run: |
          python << 'PYEOF'
          import os
          import json
          
          registry_dir = 'services/workflow-registry/techniques'
          
          if os.path.exists(registry_dir):
              print(f"Technique registry: {registry_dir}")
              
              techniques = [f for f in os.listdir(registry_dir) if f.endswith('.json')]
              print(f"Techniques defined: {len(techniques)}")
              
              for technique_file in techniques[:5]:  # Show first 5
                  filepath = os.path.join(registry_dir, technique_file)
                  with open(filepath) as f:
                      technique = json.load(f)
                  print(f"  - {technique.get('technique_id', 'unknown')}")
              
              if len(techniques) > 5:
                  print(f"  ... and {len(techniques) - 5} more")
          else:
              print("Technique registry not found")
          PYEOF

      - name: Upload technique catalog test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: technique-catalog-test-results
          path: |
            technique-catalog-test-results.xml
            results/
          retention-days: 7
