name: Test Exo Integration

on:
  push:
    branches: [main]
    paths:
      - services/exo/**/*
      - kubeadm/glasslab-v2/exo/**/*
      - .github/workflows/test-exo.yml
  workflow_dispatch:

jobs:
  test-exo-integration:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pytest requests

      - name: Validate Exo deployment
        run: |
          python << 'PYEOF'
          import yaml
          
          with open('kubeadm/glasslab-v2/exo/20-deployment.yaml') as f:
              deployment = yaml.safe_load(f)
          
          print(f"Exo deployment: {deployment['metadata']['name']}")
          
          spec = deployment['spec']['template']['spec']
          container = spec['containers'][0]
          
          print(f"Image: {container.get('image', 'N/A')}")
          print(f"Command: {container.get('command', [])}")
          
          # Check environment variables
          env = container.get('env', [])
          print(f"Environment variables ({len(env)}):")
          for e in env:
              if 'EXO' in e.get('name', ''):
                  print(f"  - {e['name']}")
          PYEOF

      - name: Validate exo configuration
        run: |
          python << 'PYEOF'
          import yaml
          
          with open('kubeadm/glasslab-v2/config/10-workflow-api-configmap.yaml') as f:
              config = yaml.safe_load(f)
          
          data = config.get('data', {})
          
          print("Exo configuration:")
          for key in data:
              if 'EXO' in key:
                  print(f"  - {key}")
          PYEOF

      - name: Check RDMA network configuration
        run: |
          python << 'PYEOF'
          import yaml
          
          # Check RDMA service
          with open('kubeadm/glasslab-v2/exo/30-service.yaml') as f:
              service = yaml.safe_load(f)
          
          print(f"Service: {service['metadata']['name']}")
          print(f"Namespace: {service['metadata'].get('namespace', 'default')}")
          
          # Check port configuration
          ports = service.get('spec', {}).get('ports', [])
          print(f"Ports ({len(ports)}):")
          for p in ports:
              print(f"  - {p.get('name', 'unnamed')}: {p.get('port', 'N/A')}/{p.get('protocol', 'TCP')}")
          PYEOF

      - name: Test exo namespace
        run: |
          python << 'PYEOF'
          import yaml
          
          # Check exo namespace label
          with open('kubeadm/glasslab-v2/exo/10-namespace.yaml') as f:
              namespace = yaml.safe_load(f)
          
          print(f"Namespace: {namespace['metadata']['name']}")
          print(f"Labels: {namespace['metadata'].get('labels', {})}")
          
          # Check label for exo namespace
          labels = namespace['metadata'].get('labels', {})
          if 'glasslab-rdma-test' in str(labels):
              print("✓ RDMA test namespace label found")
          PYEOF

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: exo-test-results
          path: |
            exo-test-results.xml
            kubeadm/glasslab-v2/exo/results/
          retention-days: 7
