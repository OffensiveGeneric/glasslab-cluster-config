name: Validate GitHub Actions Workflows

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/*.yml
      - .github/workflows/*.yaml
      - .github/workflows/validate-github-actions.yml
  workflow_dispatch:

jobs:
  validate-github-actions:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate workflow syntax
        uses: docker://actions/github-script:6a6224e45cbce40c94347ac6e611166879326c33
        with:
          script: |
            const fs = require('fs');
            const path = require('path');
            const yaml = require('js-yaml');
            
            const workflowsDir = path.join(process.cwd(), '.github/workflows');
            const files = fs.readdirSync(workflowsDir);
            
            let valid = 0;
            let invalid = 0;
            
            for (const file of files) {
              if (file.endsWith('.yml') || file.endsWith('.yaml')) {
                try {
                  const content = fs.readFileSync(path.join(workflowsDir, file), 'utf8');
                  yaml.load(content);
                  console.log(`✓ ${file}`);
                  valid++;
                } catch (e) {
                  console.error(`✗ ${file}: ${e.message}`);
                  invalid++;
                }
              }
            }
            
            console.log(`\nValid: ${valid}, Invalid: ${invalid}`);
            if (invalid > 0) process.exit(1);

      - name: Check workflow dependencies
        run: |
          python << 'PYEOF'
          import yaml
          import os
          
          workflows_dir = '.github/workflows'
          workflows = [f for f in os.listdir(workflows_dir) if f.endswith('.yml')]
          
          print("GitHub Actions workflows:")
          print("")
          
          for workflow in sorted(workflows):
              filepath = os.path.join(workflows_dir, workflow)
              with open(filepath) as f:
                  workflow_data = yaml.safe_load(f)
              
              name = workflow_data.get('name', 'unnamed')
              on = workflow_data.get('on', {})
              
              print(f"{workflow}:")
              print(f"  Name: {name}")
              
              # Check triggers
              if 'push' in on:
                  print(f"  Push triggers: {', '.join(on['push'].get('branches', []))}")
              if 'pull_request' in on:
                  print(f"  PR triggers: {', '.join(on['pull_request'].get('branches', []))}")
              if 'workflow_dispatch' in on:
                  print(f"  Manual trigger: ✓")
          PYEOF

      - name: Upload validation results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: github-actions-validation-results
          path: |
            github-actions-validation-results.xml
            results/
          retention-days: 7
