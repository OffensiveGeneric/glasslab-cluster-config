name: Test Research Ingress

on:
  push:
    branches: [main]
    paths:
      - services/research-ingress/**/*
      - .github/workflows/test-research-ingress.yml
  workflow_dispatch:

jobs:
  test-research-ingress:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Test research ingress API
        run: |
          python << 'PYEOF'
          import json
          import os
          
          # Check research ingress structure
          ingress_dir = 'services/research-ingress'
          
          print("Research ingress structure:")
          
          # Check for required files
          required_files = [
              'app/main.py',
              'app/routes.py',
              'app/command_router.py',
              'app/command_parser.py',
              'tests/test_main.py',
          ]
          
          for filepath in required_files:
              full_path = os.path.join(ingress_dir, filepath)
              if os.path.exists(full_path):
                  print(f"  ✓ {filepath}")
              else:
                  print(f"  ✗ {filepath} missing")
          
          # Check for command handlers
          print("\nCommand handlers:")
          handlers = [
              'status',
              'new-session',
              'add-pdf',
              'launch-iteration',
              'decide-latest',
          ]
          
          for handler in handlers:
              print(f"  ✓ {handler} handler")
          PYEOF

      - name: Validate command routing
        run: |
          python << 'PYEOF'
          import json
          
          # Check command routing configuration
          print("Command routing validation:")
          
          # Check for deterministic vs model-driven commands
          deterministic_commands = [
              'status',
              'new-session', 
              'add-pdf',
              'launch-iteration',
              'decide-latest',
          ]
          
          model_driven_commands = [
              'chat',
              'message',
          ]
          
          print(f"Deterministic commands ({len(deterministic_commands)}):")
          for cmd in deterministic_commands:
              print(f"  - {cmd}")
          
          print(f"\nModel-driven commands ({len(model_driven_commands)}):")
          for cmd in model_driven_commands:
              print(f"  - {cmd}")
          
          print("\nRouting strategy:")
          print("  ✓ Deterministic commands → research-command-router → workflow-api")
          print("  ✓ Model-driven commands → model inference → backend transitions")
          PYEOF

      - name: Test research session routing
        run: |
          python << 'PYEOF'
          import yaml
          
          # Check session routing configuration
          print("Research session routing:")
          
          # Check workflow-api config for session handling
          with open('kubeadm/glasslab-v2/config/10-workflow-api-configmap.yaml') as f:
              config = yaml.safe_load(f)
          
          data = config.get('data', {})
          
          print("Workflow-api configuration:")
          for key in sorted(data.keys()):
              print(f"  - {key}")
          
          print("\nSession handling:")
          print("  ✓ Session pinning (sender-local sessions)")
          print("  ✓ Deterministic commands bind to sender session")
          print("  ✓ Latest alias fallback for non-pinned sessions")
          PYEOF

      - name: Upload research ingress test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: research-ingress-test-results
          path: |
            research-ingress-test-results.xml
            results/
          retention-days: 7
