name: Build and Deploy Workflow API

on:
  push:
    branches: [main]
    paths:
      - services/workflow-api/**/*
      - services/common/**/*
      - services/workflow-registry/**/*
      - .github/workflows/workflow-api.yml
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}/glasslab-workflow-api
          tags: |
            type=raw,value={{shortCommit}}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GLASSLAB_GIT_SHA=${{ github.sha }}
            GLASSLAB_BUILD_SOURCE=github:${{ github.run_id }}
          file: services/workflow-api/Dockerfile

      - name: Update deployment image tag
        run: |
          sed -i "s|ghcr.io/offensivegeneric/glasslab-workflow-api:.*|ghcr.io/${{ github.repository }}/glasslab-workflow-api:${{ github.sha }}|g" kubeadm/glasslab-v2/workflow-api/20-deployment.yaml
          git config --global user.name "glasslab"
          git config --global user.email "glasslab@glasslab.org"
          git add kubeadm/glasslab-v2/workflow-api/20-deployment.yaml
          git commit -m "chore: update workflow-api image to ${{ github.sha }}"
          git push

      - name: Deploy to cluster
        run: |
          echo "Deployment to cluster would happen here"
          echo "Image: ghcr.io/${{ github.repository }}/glasslab-workflow-api:${{ github.sha }}"
          echo "Commit: ${{ github.sha }}"
