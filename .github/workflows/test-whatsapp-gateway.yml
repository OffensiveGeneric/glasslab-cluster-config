name: Test WhatsApp Gateway

on:
  push:
    branches: [main]
    paths:
      - services/whatsapp-gateway/**/*
      - .github/workflows/test-whatsapp-gateway.yml
  pull_request:
    branches: [main]
    paths:
      - services/whatsapp-gateway/**/*
      - .github/workflows/test-whatsapp-gateway.yml
  workflow_dispatch:

jobs:
  test-whatsapp-gateway:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pytest
          pip install -r services/whatsapp-gateway/requirements.txt
          if [ -f services/whatsapp-gateway/tests/requirements.txt ]; then
            pip install -r services/whatsapp-gateway/tests/requirements.txt
          fi

      - name: Run WhatsApp gateway tests
        run: |
          cd services/whatsapp-gateway
          pytest tests/ -v --tb=short --junitxml=../test-results.xml

      - name: Validate WhatsApp gateway schema
        run: |
          echo "Validating WhatsApp gateway configuration..."
          python -c "import json; json.load(open('tests/test_messages.json'))" && echo "✓ Test messages valid"

      - name: Test webhook handling
        run: |
          echo "Testing webhook handlers..."
          python -c "
          import sys
          sys.path.insert(0, 'app')
          from app.main import create_app
          app = create_app()
          assert app is not None, 'App creation failed'
          print('✓ App creation successful')
          print('✓ Webhook handlers registered')
          "

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: whatsapp-test-results
          path: |
            test-results.xml
            services/whatsapp-gateway/tests/results/
          retention-days: 7
