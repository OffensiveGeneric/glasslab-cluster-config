name: Validate All CI/CD

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/**/*
      - .github/workflows/validate-all.yml
  workflow_dispatch:

jobs:
  validate-all-ci:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate all workflows
        run: |
          python << 'PYEOF'
          import yaml
          import os
          
          workflows_dir = '.github/workflows'
          workflows = [f for f in os.listdir(workflows_dir) if f.endswith('.yml')]
          
          print("GitHub Actions workflows:")
          print("")
          
          total_jobs = 0
          total_steps = 0
          
          for workflow in sorted(workflows):
              filepath = os.path.join(workflows_dir, workflow)
              with open(filepath) as f:
                  workflow_data = yaml.safe_load(f)
              
              name = workflow_data.get('name', 'unnamed')
              jobs = workflow_data.get('jobs', {})
              
              job_count = len(jobs)
              step_count = sum(len(j.get('steps', [])) for j in jobs.values())
              
              total_jobs += job_count
              total_steps += step_count
              
              print(f"{workflow}:")
              print(f"  Name: {name}")
              print(f"  Jobs: {job_count}, Steps: {step_count}")
          
          print(f"\nTotal: {len(workflows)} workflows, {total_jobs} jobs, {total_steps} steps")
          PYEOF

      - name: Check workflow coverage
        run: |
          python << 'PYEOF'
          import yaml
          import os
          
          print("CI/CD coverage:")
          
          # Count workflows by purpose
          workflows_dir = '.github/workflows'
          workflows = [f for f in os.listdir(workflows_dir) if f.endswith('.yml')]
          
          purposes = {
              'build': [],
              'test': [],
              'validate': [],
              'release': [],
              'deploy': [],
          }
          
          for workflow in workflows:
              filepath = os.path.join(workflows_dir, workflow)
              with open(filepath) as f:
                  content = f.read()
              
              workflow_data = yaml.safe_load(content)
              name = workflow_data.get('name', '')
              
              if 'Build' in name:
                  purposes['build'].append(workflow)
              elif 'Test' in name:
                  purposes['test'].append(workflow)
              elif 'Validate' in name:
                  purposes['validate'].append(workflow)
              elif 'Release' in name:
                  purposes['release'].append(workflow)
              elif 'Deploy' in name:
                  purposes['deploy'].append(workflow)
          
          for purpose in sorted(purposes.keys()):
              if purposes[purpose]:
                  print(f"\n{purpose.capitalize()} ({len(purposes[purpose])}):")
                  for w in purposes[purpose]:
                      print(f"  - {w}")
          
          total = sum(len(v) for v in purposes.values())
          print(f"\nTotal: {total} purpose-specific workflows")
          PYEOF

      - name: Upload validation results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ci-validation-results
          path: |
            ci-validation-results.xml
            results/
          retention-days: 7
