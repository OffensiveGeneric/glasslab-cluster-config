name: Validate Docker Build

on:
  push:
    branches: [main]
    paths:
      - '**/Dockerfile'
      - .github/workflows/validate-docker.yml
  workflow_dispatch:

jobs:
  validate-dockerfile:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate Dockerfile syntax
        run: |
          for dockerfile in services/*/Dockerfile services/*/Dockerfile.*; do
            if [ -f "$dockerfile" ]; then
              echo "Validating $dockerfile..."
              docker buildx bake --file "$dockerfile" --print . 2>&1 | head -20
            fi
          done

      - name: Check Dockerfile best practices
        run: |
          python << 'PYEOF'
          import os
          
          print("Dockerfile best practices check:")
          
          for root, dirs, files in os.walk('.'):
              dirs[:] = [d for d in dirs if not d.startswith('.')]
              for f in files:
                  if f == 'Dockerfile' or f.startswith('Dockerfile.'):
                      filepath = os.path.join(root, f)
                      with open(filepath) as fp:
                          content = fp.read()
                      
                      # Check for best practices
                      checks = [
                          ('FROM with tag', 'FROM ' in content and ':' in content),
                          ('WORKDIR', 'WORKDIR' in content),
                          ('COPY before RUN', content.count('COPY') < content.count('RUN') or 'COPY' in content),
                          ('No secrets in Dockerfile', 'SECRET' not in content.upper()),
                      ]
                      
                      for check, passed in checks:
                          status = '✓' if passed else '✗'
                          print(f"  {status} {check}")
          PYEOF

      - name: Upload Docker validation results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: docker-validation-results
          path: |
            docker-validation-results.xml
            results/
          retention-days: 7
