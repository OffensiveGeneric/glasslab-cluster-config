name: Test GPU Experiments

on:
  push:
    branches: [main]
    paths:
      - services/runner/app/**/*
      - kubeadm/glasslab-v2/jobs/**/*
      - .github/workflows/test-gpu-experiments.yml
  pull_request:
    branches: [main]
    paths:
      - services/runner/app/**/*
      - kubeadm/glasslab-v2/jobs/**/*
      - .github/workflows/test-gpu-experiments.yml
  workflow_dispatch:

jobs:
  test-gpu-experiment:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        test-file:
          - services/runner/tests/test_runner.py
          - kubeadm/glasslab-v2/jobs/test_titanic.py
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pytest
          pip install -r services/runner/requirements.txt
          if [ -f services/runner/tests/requirements.txt ]; then
            pip install -r services/runner/tests/requirements.txt
          fi

      - name: Run GPU experiment tests
        run: |
          pytest ${{ matrix.test-file }} -v --tb=short

      - name: Validate job YAML
        run: |
          if [ -f "${{ matrix.test-file }}" ]; then
            echo "Validating job YAML..."
            python -c "import yaml; yaml.safe_load(open('${{ matrix.test-file }}'))"
          fi

      - name: Run integration tests
        if: matrix.test-file == 'services/runner/tests/test_runner.py'
        run: |
          echo "Running GPU runner integration tests..."
          pytest services/runner/tests/ -v -k integration

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gpu-test-results-${{ matrix.test-file }}
          path: |
            services/runner/tests/results/
            pytest.xml
          retention-days: 7
