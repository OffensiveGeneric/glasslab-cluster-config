name: Test Titanic Job

on:
  push:
    branches: [main]
    paths:
      - kubeadm/glasslab-v2/jobs/10-titanic-job.yaml
      - scripts/test-titanic-job.sh
      - .github/workflows/test-titanic-job.yml
  workflow_dispatch:

jobs:
  test-titanic-job:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate YAML
        run: |
          python -c "import yaml; yaml.safe_load(open('kubeadm/glasslab-v2/jobs/10-titanic-job.yaml'))"
          echo "✓ Job YAML is valid"

      - name: Check GPU node selectors
        run: |
          python << 'PYEOF'
          import yaml
          
          with open('kubeadm/glasslab-v2/jobs/10-titanic-job.yaml') as f:
              job = yaml.safe_load(f)
          
          spec = job['spec']['template']['spec']
          
          # Check node selectors
          if 'nodeSelector' in spec:
              print("✓ Node selectors defined")
              for k, v in spec['nodeSelector'].items():
                  print(f"  - {k}: {v}")
          else:
              print("⚠ No node selectors defined")
          
          # Check container resources
          container = spec['containers'][0]
          if 'resources' in container:
              print("✓ Resources defined")
              res = container['resources']
              if 'requests' in res:
                  print(f"  CPU request: {res['requests'].get('cpu', 'N/A')}")
                  print(f"  Memory request: {res['requests'].get('memory', 'N/A')}")
              if 'limits' in res:
                  print(f"  CPU limit: {res['limits'].get('cpu', 'N/A')}")
                  print(f"  Memory limit: {res['limits'].get('memory', 'N/A')}")
          PYEOF

      - name: Check GPU requirements
        run: |
          python << 'PYEOF'
          import yaml
          
          with open('kubeadm/glasslab-v2/jobs/10-titanic-job.yaml') as f:
              job = yaml.safe_load(f)
          
          spec = job['spec']['template']['spec']
          container = spec['containers'][0]
          
          # Check for GPU resource requests
          resources = container.get('resources', {})
          requests = resources.get('requests', {})
          
          if 'nvidia.com/gpu' in requests:
              print(f"✓ GPU request found: {requests['nvidia.com/gpu']}")
          else:
              print("⚠ No GPU request found")
          PYEOF

      - name: Test job template
        run: |
          python << 'PYEOF'
          import yaml
          
          with open('kubeadm/glasslab-v2/jobs/10-titanic-job.yaml') as f:
              job = yaml.safe_load(f)
          
          print(f"Job name: {job['metadata']['name']}")
          print(f"Job namespace: {job['metadata'].get('namespace', 'default')}")
          print(f"Job labels: {job['metadata'].get('labels', {})}")
          
          spec = job['spec']['template']['spec']
          container = spec['containers'][0]
          
          print(f"Container image: {container.get('image', 'N/A')}")
          print(f"Container command: {container.get('command', [])}")
          PYEOF

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: titanic-test-results
          path: |
            titanic-test-results.xml
            kubeadm/glasslab-v2/jobs/results/
          retention-days: 7
