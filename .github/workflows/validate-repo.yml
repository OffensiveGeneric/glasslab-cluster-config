name: Validate Repository

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/validate-repo.yml
  workflow_dispatch:

jobs:
  validate-repo:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate repo structure
        run: |
          python << 'PYEOF'
          import os
          
          print("Repository structure validation:")
          print("")
          
          # Check root-level directories
          required_dirs = [
              'services',
              'kubeadm',
              'docs',
              '.github',
              'scripts',
          ]
          
          print("Required directories:")
          for d in required_dirs:
              if os.path.isdir(d):
                  print(f"  ✓ {d}")
              else:
                  print(f"  ✗ {d} missing")
          
          # Check services
          services_dir = 'services'
          if os.path.exists(services_dir):
              services = [d for d in os.listdir(services_dir) if os.path.isdir(os.path.join(services_dir, d))]
              print(f"\nServices ({len(services)}):")
              for s in sorted(services):
                  print(f"  - {s}")
          
          # Check kubeadm
          kubeadm_dir = 'kubeadm'
          if os.path.exists(kubeadm_dir):
              print(f"\nKubernetes configs:")
              for d in ['glasslab-v2']:
                  path = os.path.join(kubeadm_dir, d)
                  if os.path.isdir(path):
                      print(f"  ✓ {d}")
          PYEOF

      - name: Check file organization
        run: |
          python << 'PYEOF'
          import os
          
          print("File organization:")
          
          # Check for workflows
          workflows_dir = '.github/workflows'
          if os.path.exists(workflows_dir):
              workflows = [f for f in os.listdir(workflows_dir) if f.endswith('.yml')]
              print(f"\nWorkflows ({len(workflows)}):")
              for w in sorted(workflows):
                  print(f"  - {w}")
          
          # Check for scripts
          scripts_dir = 'scripts'
          if os.path.exists(scripts_dir):
              scripts = [f for f in os.listdir(scripts_dir) if f.endswith('.sh')]
              print(f"\nScripts ({len(scripts)}):")
              for s in sorted(scripts)[:10]:  # Show first 10
                  print(f"  - {s}")
              if len(scripts) > 10:
                  print(f"  ... and {len(scripts) - 10} more")
          PYEOF

      - name: Check git hygiene
        run: |
          python << 'PYEOF'
          import os
          
          print("Git hygiene:")
          
          # Check for .gitignore
          gitignore = '.gitignore'
          if os.path.exists(gitignore):
              print(f"  ✓ {gitignore}")
              with open(gitignore) as f:
                  lines = [l.strip() for l in f if l.strip() and not l.startswith('#')]
                  print(f"    Rules: {len(lines)}")
          else:
              print(f"  ✗ {gitignore} missing")
          
          # Check for LICENSE
          license_files = ['LICENSE', 'LICENSE.md', 'LICENSE.txt']
          for lf in license_files:
              if os.path.exists(lf):
                  print(f"  ✓ {lf}")
                  break
          else:
              print(f"  ⚠ LICENSE missing")
          PYEOF

      - name: Upload repo validation results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: repo-validation-results
          path: |
            repo-validation-results.xml
            results/
          retention-days: 7
