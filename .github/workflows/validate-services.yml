name: Validate Services

on:
  push:
    branches: [main]
    paths:
      - services/**/*
      - .github/workflows/validate-services.yml
  workflow_dispatch:

jobs:
  validate-services:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate service structures
        run: |
          python << 'PYEOF'
          import os
          import json
          import yaml
          
          services_dir = 'services'
          services = [d for d in os.listdir(services_dir) 
                     if os.path.isdir(os.path.join(services_dir, d))]
          
          print(f"Services ({len(services)}):")
          print("")
          
          for service in sorted(services):
              service_dir = os.path.join(services_dir, service)
              
              # Check for required files
              required_files = ['Dockerfile', 'requirements.txt']
              optional_files = ['README.md', 'tests/test_main.py']
              
              print(f"{service}:")
              
              has_all = True
              for f in required_files:
                  if os.path.exists(os.path.join(service_dir, f)):
                      print(f"  ✓ {f}")
                  else:
                      print(f"  ✗ {f} missing")
                      has_all = False
              
              for f in optional_files:
                  if os.path.exists(os.path.join(service_dir, f)):
                      print(f"  ✓ {f} (optional)")
              
              # Check for Dockerfile
              dockerfile = os.path.join(service_dir, 'Dockerfile')
              if os.path.exists(dockerfile):
                  with open(dockerfile) as f:
                      content = f.read()
                      
                  if 'COPY requirements.txt' in content:
                      print(f"  ✓ Dockerfile uses requirements.txt")
                  if 'COPY app' in content:
                      print(f"  ✓ Dockerfile copies app directory")
          
          print("\n✓ Service structure validation complete")
          PYEOF

      - name: Check service dependencies
        run: |
          python << 'PYEOF'
          import os
          
          print("Service dependencies:")
          
          # Check common dependencies
          common_deps = ['fastapi', 'pydantic', 'uvicorn', 'httpx']
          
          services_dir = 'services'
          for service in os.listdir(services_dir):
              service_dir = os.path.join(services_dir, service)
              if os.path.isdir(service_dir):
                  req_file = os.path.join(service_dir, 'requirements.txt')
                  if os.path.exists(req_file):
                      with open(req_file) as f:
                          deps = [line.strip() for line in f if line.strip() and not line.startswith('#')]
                      
                      has_common = [d for d in common_deps if any(d in dep for dep in deps)]
                      if has_common:
                          print(f"  {service}: {', '.join(has_common)}")
          PYEOF

      - name: Upload service validation results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: service-validation-results
          path: |
            service-validation-results.xml
            results/
          retention-days: 7
