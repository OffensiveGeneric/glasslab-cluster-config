name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag to release, for example v0.1.0"
        required: true
        type: string
      target:
        description: "Target commit or branch for the release"
        required: false
        default: "main"
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  create-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
            echo "target=${{ inputs.target }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
            echo "target=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          fi

      - name: Ensure tag exists for manual release
        if: ${{ github.event_name == 'workflow_dispatch' }}
        run: |
          git fetch --tags --force
          if ! git rev-parse "${{ steps.meta.outputs.tag }}" >/dev/null 2>&1; then
            git tag "${{ steps.meta.outputs.tag }}" "${{ steps.meta.outputs.target }}"
            git push origin "${{ steps.meta.outputs.tag }}"
          fi

      - name: Create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ steps.meta.outputs.tag }}" >/dev/null 2>&1; then
            echo "Release ${{ steps.meta.outputs.tag }} already exists."
            exit 0
          fi

          gh release create "${{ steps.meta.outputs.tag }}" \
            --target "${{ steps.meta.outputs.target }}" \
            --title "Release ${{ steps.meta.outputs.tag }}" \
            --generate-notes
