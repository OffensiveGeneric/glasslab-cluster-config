name: Run Smoke Tests

on:
  push:
    branches: [main]
    paths:
      - services/workflow-api/tests/**/*
      - scripts/workflow-api-smoke-test.sh
      - .github/workflows/smoke-tests.yml
  pull_request:
    branches: [main]
    paths:
      - services/workflow-api/tests/**/*
      - scripts/workflow-api-smoke-test.sh
      - .github/workflows/smoke-tests.yml
  workflow_dispatch:

jobs:
  smoke-tests:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r services/workflow-api/tests/requirements.txt
          pip install requests

      - name: Run smoke tests
        run: |
          cd services/workflow-api
          pytest tests/ -v --tb=short
        env:
          WORKFLOW_API_URL: http://localhost:19000
          WORKFLOW_API_TIMEOUT: 10

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-test-results
          path: services/workflow-api/tests/results/
          retention-days: 7
