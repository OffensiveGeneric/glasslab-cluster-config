name: Validate Docker Builds

on:
  push:
    branches: [main]
    paths:
      - services/workflow-api/Dockerfile
      - services/runner/Dockerfile.gpu
      - services/whatsapp-gateway/**/*
      - .github/workflows/docker-builds.yml
  pull_request:
    branches: [main]
    paths:
      - services/workflow-api/Dockerfile
      - services/runner/Dockerfile.gpu
      - services/whatsapp-gateway/**/*
      - .github/workflows/docker-builds.yml
  workflow_dispatch:

jobs:
  validate-dockerfiles:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Validate workflow-api Dockerfile
        run: |
          docker buildx bake --file services/workflow-api/Dockerfile --print .
          docker buildx bake --file services/workflow-api/Dockerfile --no-cache --progress plain . 2>&1 | tee /tmp/build.log
          if grep -q "ERROR" /tmp/build.log; then
            echo "Build failed!"
            exit 1
          fi

      - name: Validate GPU runner Dockerfile
        run: |
          docker buildx bake --file services/runner/Dockerfile.gpu --print .
          docker buildx bake --file services/runner/Dockerfile.gpu --no-cache --progress plain . 2>&1 | tee /tmp/gpu-build.log
          if grep -q "ERROR" /tmp/gpu-build.log; then
            echo "GPU build failed!"
            exit 1
          fi

      - name: Validate WhatsApp gateway Dockerfile
        run: |
          docker buildx bake --file services/whatsapp-gateway/Dockerfile --print .
          docker buildx bake --file services/whatsapp-gateway/Dockerfile --no-cache --progress plain . 2>&1 | tee /tmp/whatsapp-build.log
          if grep -q "ERROR" /tmp/whatsapp-build.log; then
            echo "WhatsApp gateway build failed!"
            exit 1
          fi
