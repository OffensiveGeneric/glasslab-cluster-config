name: Validate Cluster State

on:
  push:
    branches: [main]
    paths:
      - kubeadm/glasslab-v2/**/*
      - .github/workflows/validate-cluster.yml
  workflow_dispatch:

jobs:
  validate-cluster-config:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install yaml-lint

      - name: Validate all YAML files
        run: |
          python << 'PYEOF'
          import yaml
          import os
          from pathlib import Path
          
          yaml_files = []
          for root, dirs, files in os.walk('kubeadm/glasslab-v2'):
              for f in files:
                  if f.endswith(('.yaml', '.yml')):
                      yaml_files.append(os.path.join(root, f))
          
          print(f"Found {len(yaml_files)} YAML files")
          
          errors = []
          for filepath in yaml_files:
              try:
                  with open(filepath) as f:
                      docs = list(yaml.safe_load_all(f))
                      if docs:
                          for doc in docs:
                              if doc and 'metadata' in doc:
                                  kind = doc.get('kind', 'unknown')
                                  name = doc.get('metadata', {}).get('name', 'unnamed')
                                  ns = doc.get('metadata', {}).get('namespace', 'default')
                                  print(f"  ✓ {kind}/{ns}/{name}")
              except Exception as e:
                  errors.append((filepath, str(e)))
                  print(f"  ✗ {filepath}: {e}")
          
          if errors:
              print(f"\n{len(errors)} errors found:")
              for f, e in errors:
                  print(f"  - {f}: {e}")
              exit(1)
          else:
              print(f"\n✓ All {len(yaml_files)} YAML files valid")
          PYEOF

      - name: Check namespace consistency
        run: |
          python << 'PYEOF'
          import yaml
          import os
          
          namespaces = set()
          for root, dirs, files in os.walk('kubeadm/glasslab-v2'):
              for f in files:
                  if f.endswith('.yaml'):
                      filepath = os.path.join(root, f)
                      try:
                          with open(filepath) as fp:
                              doc = yaml.safe_load(fp)
                              if doc and 'metadata' in doc:
                                  ns = doc.get('metadata', {}).get('namespace')
                                  if ns:
                                      namespaces.add(ns)
                      except:
                          pass
          
          print(f"Namespaces found ({len(namespaces)}):")
          for ns in sorted(namespaces):
              print(f"  - {ns}")
          PYEOF

      - name: Check resource definitions
        run: |
          python << 'PYEOF'
          import yaml
          import os
          
          resources = {}
          for root, dirs, files in os.walk('kubeadm/glasslab-v2'):
              for f in files:
                  if f.endswith('.yaml'):
                      filepath = os.path.join(root, f)
                      try:
                          with open(filepath) as fp:
                              doc = yaml.safe_load(fp)
                              if doc and 'metadata' in doc:
                                  kind = doc.get('kind', 'unknown')
                                  name = doc.get('metadata', {}).get('name', 'unnamed')
                                  if kind not in resources:
                                      resources[kind] = []
                                  resources[kind].append(name)
                      except:
                          pass
          
          print(f"Resources defined:")
          for kind in sorted(resources.keys()):
              print(f"  {kind} ({len(resources[kind])}):")
              for name in sorted(resources[kind]):
                  print(f"    - {name}")
          PYEOF

      - name: Upload validation results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: cluster-validation-results
          path: |
            cluster-validation-results.xml
            kubeadm/glasslab-v2/results/
          retention-days: 7
