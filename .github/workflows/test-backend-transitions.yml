name: Test Backend Transitions

on:
  push:
    branches: [main]
    paths:
      - services/workflow-api/app/transition_routes.py
      - services/workflow-api/app/schemas.py
      - .github/workflows/test-backend-transitions.yml
  pull_request:
    branches: [main]
    paths:
      - services/workflow-api/app/transition_routes.py
      - services/workflow-api/app/schemas.py
      - .github/workflows/test-backend-transitions.yml
  workflow_dispatch:

jobs:
  test-backend-transitions:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install pytest
          pip install fastapi httpx
          pip install -r services/workflow-api/requirements.txt

      - name: Test transition routes
        run: |
          python -m py_compile services/workflow-api/app/transition_routes.py
          echo "✓ Transition routes syntax valid"

      - name: Test transition schemas
        run: |
          python -m py_compile services/workflow-api/app/schemas.py
          echo "✓ Transition schemas syntax valid"
          
          python << 'PYEOF'
          import sys
          sys.path.insert(0, 'services/workflow-api')
          sys.path.insert(0, 'services/common')
          
          from app.transition_routes import register_transitions_routes
          from app.schemas import (
              StartLiteratureSearchRequest,
              PromotePaperToIntakeRequest,
              CreateInterpretationRequest,
              CreateMethodologyDraftRequest,
              CreateValidationRunRequest,
              StartLiteratureSearchResponse,
              PromotePaperToIntakeResponse,
              CreateInterpretationResponse,
              CreateMethodologyDraftResponse,
              CreateValidationRunResponse,
          )
          
          # Test that all schemas are valid
          assert StartLiteratureSearchRequest(session_id="test", max_candidate_papers=3).session_id == "test"
          assert PromotePaperToIntakeRequest(queue_id="q1", paper_id="p1").queue_id == "q1"
          assert CreateInterpretationRequest(intake_id="i1").intake_id == "i1"
          assert CreateMethodologyDraftRequest(interpretation_id="d1").interpretation_id == "d1"
          assert CreateValidationRunRequest(design_id="des1").design_id == "des1"
          
          print("✓ All transition request schemas valid")
          print("✓ All transition response schemas valid")
          PYEOF

      - name: Test route registration
        run: |
          python << 'PYEOF'
          import sys
          sys.path.insert(0, 'services/workflow-api')
          sys.path.insert(0, 'services/common')
          
          # Verify route functions exist
          from app.transition_routes import register_transitions_routes
          assert callable(register_transitions_routes)
          
          # Verify route paths
          routes = [
              '/transitions/start-literature-search',
              '/transitions/promote-paper-to-intake', 
              '/transitions/create-interpretation',
              '/transitions/create-methodology-draft',
              '/transitions/create-validation-run',
          ]
          
          print("✓ All transition routes defined:")
          for route in routes:
              print(f"  - {route}")
          PYEOF

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: transition-test-results
          path: |
            transition-test-results.xml
            services/workflow-api/tests/results/
          retention-days: 7
