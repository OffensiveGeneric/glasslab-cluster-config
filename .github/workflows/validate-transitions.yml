name: Validate Backend Transitions

on:
  push:
    branches: [main]
    paths:
      - services/workflow-api/app/transition_routes.py
      - services/workflow-api/app/schemas.py
      - .github/workflows/validate-transitions.yml
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r services/workflow-api/requirements.txt
          pip install pydantic==2.7.0

      - name: Validate Python syntax
        run: |
          python -m py_compile services/workflow-api/app/transition_routes.py
          python -m py_compile services/workflow-api/app/schemas.py
          python -m py_compile services/workflow-api/app/main.py

      - name: Check route definitions
        run: |
          echo "Validating transition endpoints..."
          grep -q "POST /transitions/start-literature-search" services/workflow-api/app/transition_routes.py && echo "✓ start-literature-search route found"
          grep -q "POST /transitions/promote-paper-to-intake" services/workflow-api/app/transition_routes.py && echo "✓ promote-paper-to-intake route found"
          grep -q "POST /transitions/create-interpretation" services/workflow-api/app/transition_routes.py && echo "✓ create-interpretation route found"
          grep -q "POST /transitions/create-methodology-draft" services/workflow-api/app/transition_routes.py && echo "✓ create-methodology-draft route found"
          grep -q "POST /transitions/create-validation-run" services/workflow-api/app/transition_routes.py && echo "✓ create-validation-run route found"

      - name: Check schema definitions
        run: |
          echo "Validating transition schemas..."
          grep -q "class StartLiteratureSearchRequest" services/workflow-api/app/schemas.py && echo "✓ StartLiteratureSearchRequest schema found"
          grep -q "class PromotePaperToIntakeRequest" services/workflow-api/app/schemas.py && echo "✓ PromotePaperToIntakeRequest schema found"
          grep -q "class CreateInterpretationRequest" services/workflow-api/app/schemas.py && echo "✓ CreateInterpretationRequest schema found"
          grep -q "class CreateMethodologyDraftRequest" services/workflow-api/app/schemas.py && echo "✓ CreateMethodologyDraftRequest schema found"
          grep -q "class CreateValidationRunRequest" services/workflow-api/app/schemas.py && echo "✓ CreateValidationRunRequest schema found"
