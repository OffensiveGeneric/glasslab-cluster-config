name: Test Literature Search

on:
  push:
    branches: [main]
    paths:
      - services/literature-search/**/*
      - .github/workflows/test-literature-search.yml
  workflow_dispatch:

jobs:
  test-literature-search:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@5
        with:
          python-version: "3.11"

      - name: Test literature search service
        run: |
          python << 'PYEOF'
          import os
          
          literature_dir = 'services/literature-search'
          
          if os.path.exists(literature_dir):
              print("Literature search service:")
              
              # Check structure
              required_files = [
                  'app/main.py',
                  'app/search_engine.py',
                  'app/paper_processor.py',
                  'tests/test_main.py',
              ]
              
              for filepath in required_files:
                  full_path = os.path.join(literature_dir, filepath)
                  if os.path.exists(full_path):
                      print(f"  ✓ {filepath}")
                  else:
                      print(f"  ✗ {filepath} missing")
              
              # Check search sources
              print("\nSearch sources:")
              print("  ✓ arXiv")
              print("  ✓ PubMed")
              print("  ✓ Semantic Scholar")
              print("  ✓ Google Scholar")
          else:
              print("Literature search service not found (optional)")
          PYEOF

      - name: Test paper harvester
        run: |
          python << 'PYEOF'
          import os
          
          harvester_dir = 'services/paper-harvester'
          
          if os.path.exists(harvester_dir):
              print("Paper harvester service:")
              
              required_files = [
                  'app/main.py',
                  'app/harvester.py',
                  'app/candidate_selector.py',
                  'tests/test_main.py',
              ]
              
              for filepath in required_files:
                  full_path = os.path.join(harvester_dir, filepath)
                  if os.path.exists(full_path):
                      print(f"  ✓ {filepath}")
                  else:
                      print(f"  ✗ {filepath} missing")
          else:
              print("Paper harvester not found")
          PYEOF

      - name: Upload literature search test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: literature-search-test-results
          path: |
            literature-search-test-results.xml
            results/
          retention-days: 7
