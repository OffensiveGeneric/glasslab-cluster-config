name: Validate Python Code

on:
  push:
    branches: [main]
    paths:
      - '**/*.py'
      - .github/workflows/validate-python.yml
  workflow_dispatch:

jobs:
  validate-python:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install flake8 black mypy

      - name: Run flake8
        run: |
          flake8 services/ --count --select=E9,F63,F7,F82 --show-source --statistics
          flake8 services/ --count --exit-zero --max-complexity=10 --max-line-length=120 --statistics

      - name: Run black
        run: |
          black --check services/

      - name: Run mypy
        run: |
          mypy services/ --no-error-summary 2>&1 | head -50
          if [ $? -eq 0 ]; then
            echo "✓ Mypy passed"
          else
            echo "⚠ Mypy found issues (non-blocking)"
          fi

      - name: Check for syntax errors
        run: |
          python -m py_compile services/workflow-api/app/transition_routes.py
          python -m py_compile services/workflow-api/app/schemas.py
          python -m py_compile services/workflow-api/app/main.py
          echo "✓ All transition routes syntax valid"
