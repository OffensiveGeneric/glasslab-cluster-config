name: Test Metrics and Reporting

on:
  push:
    branches: [main]
    paths:
      - services/metrics/**/*
      - services/reporter/**/*
      - .github/workflows/test-metrics-reporting.yml
  workflow_dispatch:

jobs:
  test-metrics-reporting:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Test metrics service
        run: |
          python << 'PYEOF'
          import os
          
          metrics_dir = 'services/metrics'
          
          if os.path.exists(metrics_dir):
              print("Metrics service:")
              
              # Check structure
              required_files = [
                  'app/main.py',
                  'app/metrics_collector.py',
                  'app/metrics_processor.py',
                  'tests/test_main.py',
              ]
              
              for filepath in required_files:
                  full_path = os.path.join(metrics_dir, filepath)
                  if os.path.exists(full_path):
                      print(f"  ✓ {filepath}")
                  else:
                      print(f"  ✗ {filepath} missing")
          else:
              print("Metrics service not found (optional)")
          PYEOF

      - name: Test reporter service
        run: |
          python << 'PYEOF'
          import os
          
          reporter_dir = 'services/reporter'
          
          if os.path.exists(reporter_dir):
              print("Reporter service:")
              
              # Check structure
              required_files = [
                  'app/main.py',
                  'app/report_generator.py',
                  'app/report_aggregator.py',
                  'tests/test_main.py',
              ]
              
              for filepath in required_files:
                  full_path = os.path.join(reporter_dir, filepath)
                  if os.path.exists(full_path):
                      print(f"  ✓ {filepath}")
                  else:
                      print(f"  ✗ {filepath} missing")
              
              # Check report types
              print("\nReport types:")
              print("  ✓ Experiment reports")
              print("  ✓ Model comparison reports")
              print("  ✓ Batch run reports")
          else:
              print("Reporter service not found (optional)")
          PYEOF

      - name: Test metrics collection
        run: |
          python << 'PYEOF'
          import yaml
          
          # Check metrics collection configuration
          metrics_config = 'kubeadm/glasslab-v2/metrics/10-configmap.yaml'
          
          if os.path.exists(metrics_config):
              with open(metrics_config) as f:
                  config = yaml.safe_load(f)
              
              print("Metrics collection configuration:")
              
              data = config.get('data', {})
              for key in sorted(data.keys()):
                  print(f"  - {key}: {data[key][:50]}...")
          else:
              print("Metrics config not found (optional)")
          PYEOF

      - name: Upload metrics/reporting test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: metrics-reporting-test-results
          path: |
            metrics-reporting-test-results.xml
            results/
          retention-days: 7
