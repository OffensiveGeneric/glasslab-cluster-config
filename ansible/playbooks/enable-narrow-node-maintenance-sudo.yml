---
- name: Enable narrow passwordless sudo for reviewed node maintenance wrappers
  hosts: "{{ maintenance_sudo_target_group | default('workers') }}"
  gather_facts: true
  become: true
  vars:
    maintenance_sudo_user: clusteradmin
  tasks:
    - name: Install wrapper for importing a containerd image archive
      ansible.builtin.copy:
        dest: /usr/local/sbin/glasslab-import-k8s-image
        mode: '0755'
        owner: root
        group: root
        content: |
          #!/usr/bin/env bash
          set -euo pipefail

          usage() {
            echo "Usage: glasslab-import-k8s-image <tar-path>" >&2
          }

          if [[ "${1:-}" == "--help" || "${1:-}" == "-h" ]]; then
            usage
            exit 0
          fi

          [[ $# -eq 1 ]] || { usage; exit 1; }
          archive="$1"
          [[ -f "$archive" ]] || { echo "archive not found: $archive" >&2; exit 1; }

          exec ctr -n k8s.io images import "$archive"

    - name: Install wrapper for checking whether a containerd image exists
      ansible.builtin.copy:
        dest: /usr/local/sbin/glasslab-has-k8s-image
        mode: '0755'
        owner: root
        group: root
        content: |
          #!/usr/bin/env bash
          set -euo pipefail

          usage() {
            echo "Usage: glasslab-has-k8s-image <image-ref>" >&2
          }

          if [[ "${1:-}" == "--help" || "${1:-}" == "-h" ]]; then
            usage
            exit 0
          fi

          [[ $# -eq 1 ]] || { usage; exit 1; }
          image_ref="$1"

          ctr -n k8s.io images ls | awk '{print $1}' | grep -Fx "$image_ref" >/dev/null

    - name: Install wrapper for staging the Titanic dataset into the live path
      ansible.builtin.copy:
        dest: /usr/local/sbin/glasslab-install-titanic-dataset
        mode: '0755'
        owner: root
        group: root
        content: |
          #!/usr/bin/env bash
          set -euo pipefail

          usage() {
            echo "Usage: glasslab-install-titanic-dataset <remote-stage-dir> <remote-dataset-dir>" >&2
          }

          if [[ "${1:-}" == "--help" || "${1:-}" == "-h" ]]; then
            usage
            exit 0
          fi

          [[ $# -eq 2 ]] || { usage; exit 1; }
          remote_stage="$1"
          remote_dataset_dir="$2"

          case "$remote_stage" in
            /tmp/glasslab-titanic-sync-*) ;;
            *)
              echo "refusing unexpected staging path: $remote_stage" >&2
              exit 1
              ;;
          esac

          case "$remote_dataset_dir" in
            /var/lib/glasslab-agent/datasets/titanic) ;;
            *)
              echo "refusing unexpected dataset path: $remote_dataset_dir" >&2
              exit 1
              ;;
          esac

          sync_ts="$(date +%Y%m%d-%H%M%S)"
          backup_root="$(dirname "$remote_dataset_dir")"
          backup_dir="$backup_root/_sync_backup_$sync_ts"

          install -d -m 0755 "$remote_dataset_dir" "$backup_dir"

          for file in train.csv test.csv gender_submission.csv sample_submission.csv; do
            if [[ -f "$remote_dataset_dir/$file" ]]; then
              cp -a "$remote_dataset_dir/$file" "$backup_dir/$file"
            fi
            if [[ -f "$remote_stage/$file" ]]; then
              install -o root -g root -m 0644 "$remote_stage/$file" "$remote_dataset_dir/$file"
            fi
          done

          printf 'official_source=kaggle\ncompetition=titanic\nsynced_at_utc=%s\n' \
            "$(date -u +%Y-%m-%dT%H:%M:%SZ)" > "$remote_dataset_dir/.dataset-source"
          chmod 0644 "$remote_dataset_dir/.dataset-source"
          rm -rf "$remote_stage"

          printf 'REMOTE_BACKUP_DIR=%s\n' "$backup_dir"
          wc -l "$remote_dataset_dir/train.csv" "$remote_dataset_dir/test.csv"

    - name: Install narrow sudoers policy for reviewed maintenance wrappers
      ansible.builtin.copy:
        dest: /etc/sudoers.d/50-glasslab-node-maintenance
        mode: '0440'
        owner: root
        group: root
        content: |
          {{ maintenance_sudo_user }} ALL=(root) NOPASSWD: /usr/local/sbin/glasslab-import-k8s-image *
          {{ maintenance_sudo_user }} ALL=(root) NOPASSWD: /usr/local/sbin/glasslab-has-k8s-image *
          {{ maintenance_sudo_user }} ALL=(root) NOPASSWD: /usr/local/sbin/glasslab-install-titanic-dataset *

    - name: Validate sudoers policy
      ansible.builtin.command: visudo -cf /etc/sudoers.d/50-glasslab-node-maintenance
      changed_when: false

    - name: Verify wrapper-based passwordless sudo
      ansible.builtin.command: sudo -n /usr/local/sbin/glasslab-import-k8s-image --help
      register: import_wrapper_check
      changed_when: false

    - name: Verify dataset wrapper-based passwordless sudo
      ansible.builtin.command: sudo -n /usr/local/sbin/glasslab-install-titanic-dataset --help
      register: dataset_wrapper_check
      changed_when: false

    - name: Summarize narrow maintenance sudo state
      ansible.builtin.debug:
        msg:
          host: "{{ inventory_hostname }}"
          import_wrapper_sudo: "{{ import_wrapper_check.rc == 0 }}"
          dataset_wrapper_sudo: "{{ dataset_wrapper_check.rc == 0 }}"
