# ProxyDHCP PXE only. Router 192.168.1.100 hands out leases.
port=0
interface=enp0s25
bind-interfaces

# Proxy on subnet
dhcp-range=192.168.1.0,proxy,255.255.255.0

# Host-specific legacy chainloading test for the new Precision 5810
dhcp-host=18:66:da:23:44:38,set:node49
dhcp-userclass=set:ipxe,iPXE
dhcp-boot=tag:node49,tag:ipxe,autoexec.ipxe,,192.168.1.44
dhcp-boot=tag:node49,undionly.kpxe,,192.168.1.44

# Detect UEFI x86_64 (ARCH=7)
dhcp-match=set:efi64,option:client-arch,7

# Offer PXE services (correct syntax includes the "type")
pxe-service=tag:efi64,tag:!node51,x86-64_EFI,"UEFI iPXE",ipxe-intel.efi
pxe-service=tag:node51,x86PC,"Node51 PXELINUX",node51/lpxelinux.0
pxe-service=tag:!node51,x86PC,"BIOS iPXE",ipxe-intel.pxe

# Node04 candidate uses undionly.kpxe to work around a buggy BIOS PXE stack.
# This host never returns with the iPXE user class after ipxe-intel.pxe/ipxe-generic.pxe.
dhcp-host=18:66:da:24:44:de,set:node51
dhcp-boot=tag:node51,node51/lpxelinux.0,,192.168.1.44

# Ensure next-server is set in the BOOTP header for compatibility
dhcp-boot=tag:efi64,tag:!node49,tag:!node51,ipxe-intel.efi,,192.168.1.44
dhcp-boot=tag:!node49,tag:!node51,ipxe-intel.pxe,,192.168.1.44

log-dhcp
